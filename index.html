async function loadLeaflet(){

function fetchJson(url,timeout=10000){return new Promise((resolve,reject)=>{const c=new AbortController();const t=setTimeout(()=>c.abort(),timeout);fetch(url,{cache:'no-store',signal:c.signal}).then(r=>{if(!r.ok)throw new Error(r.status+' '+r.statusText);return r.json()}).then(v=>{clearTimeout(t);resolve(v)}).catch(e=>{clearTimeout(t);reject(e)})})}

function escapeHtml(v){return String(v).normalize('NFC').replace(/[&<>\"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#039;'}[c]))}

 };
 if(names[n])return names[n];
 if(n.includes('luong')&&n.includes('mua'))return 'Lượng mưa (Rainfall)';if(n.includes('xop'))return 'Độ xốp (Porosity)';if(n.includes('dien')&&(n.includes('tich')||n.includes('tiach')))return 'Diện tích (Area)';

function monthEnglish(num){return ['','January','February','March','April','May','June','July','August','September','October','November','December'][num]||''}
function formatMonthValue(raw){const s=stripAccents(raw).replace(/\s+/g,' ').trim();let m=s.match(/^(?:thang|t)?\s*(1[0-2]|[1-9])$/);if(m){const num=Number(m[1]);return `Tháng ${num} (${monthEnglish(num)})`}m=s.match(/^(?:thang|t)?\s*(1[0-2]|[1-9])\s*[-–—/]\s*(?:thang|t)?\s*(1[0-2]|[1-9])$/);if(m){const a=Number(m[1]),b=Number(m[2]);return `Tháng ${a}–${b} (${monthEnglish(a)}–${monthEnglish(b)})`}return null}
function normalizeNumericToken(token){
 let t=String(token).replace(/\s+/g,'');
 const sign=t.startsWith('-')?'-':t.startsWith('+')?'+':'';
 if(sign)t=t.slice(1);
 if(!/[.,]/.test(t))return sign+t;
 const dots=(t.match(/\./g)||[]).length,commas=(t.match(/,/g)||[]).length;
 if(dots&&commas){
  const decimalSep=t.lastIndexOf('.')>t.lastIndexOf(',')?'.':',';
  const thousandsSep=decimalSep==='.'?',':'.';
  t=t.split(thousandsSep).join('');
  if(decimalSep===',')t=t.replace(',','.');
  return sign+t;
 }
 if(commas){
  const parts=t.split(',');
  if(commas>1&&parts.slice(1).every(p=>p.length===3))return sign+parts.join('');
  if(commas===1){
   const [a,b]=parts;
   if(b.length===3&&a!=='0')return sign+a+b;
   return sign+a+'.'+b;
  }
 }
 /* Dấu chấm được giữ làm dấu thập phân theo chuẩn tiếng Anh. */
 return sign+t;
}
function normalizeNumericText(raw){

function formatPlainNumber(v,maxDecimals=2){
 if(!Number.isFinite(v))return '';

function normalizeDegreeAndUnits(raw,key){let s=String(raw).normalize('NFC').trim(),kn=normalizedKey(key);s=s.replace(/\b(?:o|0|º|°)\s*c\b/gi,'°C');s=s.replace(/(-?\d+(?:[.,]\d+)?)\s*(?:o|0|º|°)\s*c\b/gi,'$1 °C');s=s.replace(/(-?\d+(?:[.,]\d+)?)\s*c\b/gi,'$1 °C');if(kn.includes('nhiet do')||/temperature/.test(kn)||/^(t\s*(min|max|tb|mean)|tmin|tmax|ttb|tmean)$/.test(kn)){if(/^[-+]?\d+(?:[.,]\d+)?$/.test(s))s+=' °C'}s=s.replace(/(-?\d+(?:[.,]\d+)?)\s*(?:o|º)\b/g,'$1°');s=s.replace(/\s*(cm|mm|km|ha|m²|m2|%|ppm|mg\/kg|mm\/năm|mm\/year)\b/gi,' $1');s=s.replace(/\bm2\b/gi,'m²');return s}
function formatValue(value,key=''){if(value===null||typeof value==='undefined')return '';let raw=String(value).normalize('NFC').trim();if(!raw)return '';if(/^dp3$/i.test(raw))return 'DP3';if(/^tpcg$/i.test(raw))return 'TPCG';if(/^ec$/i.test(raw))return 'EC';if(/^om$/i.test(raw))return 'OM';const n=stripAccents(raw).replace(/\s+/g,' ').trim(),kn=normalizedKey(key);if((kn.includes('do am')||kn==='doam'||kn.includes('moisture'))&&/^[-+]?\d+(?:[.,]\d+)?$/.test(raw))return normalizeNumericText(raw)+' %';if(kn.includes('thang')||kn.includes('mua mua')||kn.includes('mua kho')){const month=formatMonthValue(raw);if(month)return month}const exact={'tot':'Tốt (Good)','good':'Tốt (Good)','trung binh':'Trung bình (Fair)','tb':'Trung bình (Fair)','fair':'Trung bình (Fair)','kem':'Kém (Poor)','poor':'Kém (Poor)','trong moi':'Trồng mới (New plantation)','tm':'Trồng mới (New plantation)','new':'Trồng mới (New plantation)','ngap tb':'Ngập úng trung bình (Moderate waterlogging)','ngap trung binh':'Ngập úng trung bình (Moderate waterlogging)','ngap nhe':'Ngập úng nhẹ (Mild waterlogging)','ngap nang':'Ngập úng nặng (Severe waterlogging)','khong ngap':'Không ngập úng (No waterlogging)','cao':'Cao (High)','thap':'Thấp (Low)','co':'Có (Yes)','khong':'Không (No)','yes':'Có (Yes)','no':'Không (No)','dang sx':'Đang sản xuất (In production)','dang san xuat':'Đang sản xuất (In production)','nghi':'Ngừng sản xuất (Inactive)','nho giot':'Nhỏ giọt (Drip irrigation)','phun mua':'Phun mưa (Sprinkler irrigation)','tuoi tran':'Tưới tràn (Flood irrigation)','khong tuoi':'Không tưới (No irrigation)','cat':'Cát (Sand)','set':'Sét (Clay)','thit':'Thịt (Loam)','set cat':'Sét cát (Sandy clay)','cat set':'Cát sét (Clayey sand)','set thit':'Sét thịt (Clay loam)','thit set':'Thịt sét (Clay loam)','thit cat':'Thịt cát (Sandy loam)','cat thit':'Cát thịt (Sandy loam)','set thit cat':'Sét thịt cát (Sandy clay loam)'};if(exact[n])return exact[n];const month=formatMonthValue(raw);if(month&&(kn.includes('thang')||kn.includes('mua mua')||kn.includes('mua kho')||/^\s*(?:tháng|thang|t)\s*\d/i.test(raw)))return month;return normalizeNumericText(normalizeDegreeAndUnits(raw,key))}

/* Hàm lượng quy đổi để bù phần N và K thay đổi do NPK 15-15-15.
   Urê 46% N; KCl 60% K₂O. K₂SO₄ vẫn tăng/giảm 5% riêng theo chỉ tiêu K. */
const FERTILIZER_GRADE={npkN:0.15,npkK:0.15,ureaN:0.46,kclK:0.60};
const PROPERTY_ALIASES={
 OM:['OM','ORGANIC MATTER','CHAT HUU CO','HUU CO','OM DAT','SOIL OM'],
 N:['N','NITROGEN','N TONG SO','TOTAL N'],
 P:['P','P2O5','PHOSPHORUS','LAN','P DE TIEU'],
 K:['K','K2O','POTASSIUM','KALI','K TRAO DOI'],
 PH:['PHH2O','PH H2O','PH NƯỚC','PH NUOC','PH WATER','PH','ĐỘ PH','DO PH']
};
function findProperty(properties,indicator){const aliases=(PROPERTY_ALIASES[indicator]||[indicator]).map(normalizedKey);for(const [k,v] of Object.entries(properties||{})){const nk=normalizedKey(k);if(aliases.some(a=>nk===a||nk.endsWith(' '+a)||nk.includes(a+' dat')||nk.includes(a+' soil')))return {key:k,value:v}}return null}
function parseNumber(raw){if(raw===null||typeof raw==='undefined')return null;if(typeof raw==='number'&&Number.isFinite(raw))return raw;const text=String(raw).trim();const m=text.replace(/\s/g,'').match(/[-+]?\d+(?:[.,]\d+)?/);if(!m)return null;const n=Number(m[0].replace(',','.'));return Number.isFinite(n)?n:null}
function classifyText(raw){const s=stripAccents(raw);if(/(^|\b)(thap|low|poor)(\b|$)/.test(s))return 'low';if(/(^|\b)(trung binh|tb|medium|fair|average)(\b|$)/.test(s))return 'medium';if(/(^|\b)(cao|high|rich)(\b|$)/.test(s))return 'high';return null}
function getClassification(properties,indicator){
 const hit=findProperty(properties,indicator);if(!hit)return {level:'unknown',factor:1,display:'Không có dữ liệu',raw:null,value:null};
 const textLevel=classifyText(hit.value);if(textLevel)return {level:textLevel,factor:textLevel==='low'?1.05:textLevel==='high'?0.95:1,display:String(hit.value),raw:hit.value,value:null};
 let value=parseNumber(hit.value);if(value===null)return {level:'unknown',factor:1,display:String(hit.value),raw:hit.value,value:null};
 const rawText=stripAccents(hit.value);
 if(indicator==='N'&&(rawText.includes('ppm')||rawText.includes('mg/kg')||(!rawText.includes('%')&&value>5)))value=value/10000;
 const lim=SOIL_LIMITS[indicator];if(!lim)return {level:'unknown',factor:1,display:String(hit.value),raw:hit.value,value};
 const level=value<lim.low?'low':value>lim.high?'high':'medium';
 const shown=indicator==='N'?`${Number(value.toFixed(4))} %`:String(hit.value);
 return {level,factor:level==='low'?1.05:level==='high'?0.95:1,display:shown,raw:hit.value,value};
}
function limeRateFromPH(value){
 if(!Number.isFinite(value))return null;
 if(value<5)return 1000;
 if(value<=6)return 500;
 return 0;

function getLimeRecommendation(properties){
 const hit=findProperty(properties,'PH');
 if(!hit)return {dose:null,level:'unknown',vi:'Chưa có pH H₂O: chưa xác định lượng vôi',en:'No pH H₂O data: lime rate not determined'};
 const text=stripAccents(hit.value);
 let value=parseNumber(hit.value),level='unknown',dose=null;
 if(value!==null){
  dose=limeRateFromPH(value);
  level=value<5?'very-acid':value<=6?'slightly-acid':'neutral-alkaline';
 }else if(text.includes('rat chua')){dose=1000;level='very-acid'}
 else if(text.includes('it chua')){dose=500;level='slightly-acid'}
 else if(text.includes('trung tinh')||text.includes('kiem')){dose=0;level='neutral-alkaline'};
 if(dose===null)return {dose:null,level:'unknown',vi:'pH H₂O không hợp lệ: chưa xác định lượng vôi',en:'Invalid pH H₂O: lime rate not determined'};
 if(level==='very-acid')return {dose,level,vi:'pH H₂O <5: bón 1000 g/cây',en:'pH H₂O <5: apply 1000 g/tree'};
 if(level==='slightly-acid')return {dose,level,vi:'pH H₂O 5–6: bón 500 g/cây',en:'pH H₂O 5–6: apply 500 g/tree'};

function adjustmentText(item,c,classes){
 /* Mg, Zn, B và vật tư khóa giữ nguyên, không cần ghi giải thích dài. */
 if(item.locked)return null;
 const pChanged=classes.P&&(classes.P.level==='low'||classes.P.level==='high');
 const offset=(pChanged&&(item.name==='Urê'||item.name==='KCl'));
 const viOffset=offset?'; bù NPK':'';
 const enOffset=offset?'; NPK offset':'';
 if(c.level==='low')return {vi:`${item.indicator} thấp: +5%${viOffset}`,en:`Low ${item.indicator}: +5%${enOffset}`,kind:'up'};
 if(c.level==='high')return {vi:`${item.indicator} cao: -5%${viOffset}`,en:`High ${item.indicator}: -5%${enOffset}`,kind:'down'};
 if(c.level==='medium')return {vi:`${item.indicator} trung bình: theo quy trình${viOffset}`,en:`Average ${item.indicator}: standard rate${enOffset}`,kind:'same'};

function formatDose(v){if(!Number.isFinite(v)||Math.abs(v)<0.000001)return '';return formatPlainNumber(v,2)}
function createFertilizerRecommendation(properties){
 const classes={};['OM','N','P','K'].forEach(k=>classes[k]=getClassification(properties,k));
 const limeRecommendation=getLimeRecommendation(properties);
 const byName=Object.fromEntries(FERTILIZER_PROTOCOL.map(x=>[x.name,x]));
 const adjustedByName={};
 FERTILIZER_PROTOCOL.forEach(item=>adjustedByName[item.name]=item.doses.slice());
 /* Vôi giữ đúng thời điểm T1 và T13 của bảng gốc; liều tại mỗi lần bón được xác định theo pH H₂O.
    pH <5: 1000 g/cây; pH 5–6: 500 g/cây; pH >6: không bón. */
 adjustedByName['Vôi']=byName['Vôi'].doses.map((base,i)=>i===0||base===0?0:(limeRecommendation.dose===null?0:limeRecommendation.dose));

 /* TM luôn giữ nguyên. T1–T24 dùng đúng liều và đúng tháng trong bảng gốc:
    - Phân hữu cơ theo OM; NPK theo P; Urê theo N; KCl và K₂SO₄ theo K.
    - Ô trống luôn giữ trống, tuyệt đối không tự sinh thêm lần bón.
    - Khi NPK thay đổi ±5%, bù phần N tương ứng vào Urê và phần K₂O tương ứng vào KCl.
    - K₂SO₄ vẫn tăng/giảm riêng đúng 5% theo K, không gánh phần bù của NPK. */
 for(let i=1;i<STAGES.length;i++){
  const omFactor=(classes.OM&&classes.OM.factor)||1;
  const nFactor=(classes.N&&classes.N.factor)||1;
  const pFactor=(classes.P&&classes.P.factor)||1;
  const kFactor=(classes.K&&classes.K.factor)||1;

  const baseOrganic=byName['Phân hữu cơ'].doses[i]||0;
  const baseNpk=byName['NPK 15-15-15'].doses[i]||0;
  const baseUrea=byName['Urê'].doses[i]||0;
  const baseKcl=byName['KCl'].doses[i]||0;
  const baseK2so4=byName['K₂SO₄'].doses[i]||0;

  const adjustedNpk=baseNpk===0?0:baseNpk*pFactor;
  const deltaNpk=adjustedNpk-baseNpk;

  adjustedByName['Phân hữu cơ'][i]=baseOrganic===0?0:baseOrganic*omFactor;
  adjustedByName['NPK 15-15-15'][i]=adjustedNpk;

  /* Urê: trước hết tăng/giảm đúng 5% theo N, sau đó trừ/cộng lượng Urê
     tương đương với phần N đã tăng/giảm do NPK. Nếu quy trình không bón Urê
     ở tháng đó thì vẫn để trống. */
  adjustedByName['Urê'][i]=baseUrea===0?0:Math.max(0,
   baseUrea*nFactor-(deltaNpk*FERTILIZER_GRADE.npkN/FERTILIZER_GRADE.ureaN)
  );

  /* KCl: trước hết tăng/giảm đúng 5% theo K, sau đó trừ/cộng lượng KCl
     tương đương với phần K₂O đã tăng/giảm do NPK. */
  adjustedByName['KCl'][i]=baseKcl===0?0:Math.max(0,
   baseKcl*kFactor-(deltaNpk*FERTILIZER_GRADE.npkK/FERTILIZER_GRADE.kclK)
  );

  adjustedByName['K₂SO₄'][i]=baseK2so4===0?0:baseK2so4*kFactor;
 }

 let html='<div class="fert-box">';
 html+='<div class="fert-title"><div class="fert-title-vi">Hướng dẫn bón phân <span class="fert-title-en">(Fertilizer recommendation)</span> <span class="fert-title-unit">· g/cây</span></div></div>';

  const c=item.locked?{factor:1,level:'locked'}:(classes[item.indicator]||{factor:1,level:'unknown'});

  const noteClass=note?(note.kind==='up'?'fert-note-up':note.kind==='down'?'fert-note-down':'fert-note-same'):'';

  }else{

  }

   html+=`<td class="${cls}" title="${escapeHtml(title)}">${formatDose(adjusted)}</td>`;
  });
  html+='</tr>';
 });
 html+='</tbody></table></div>';
 return html+'</div>';
}

 FERTILIZER_PROTOCOL.forEach(item=>{

 });

function validateAdjustmentMath(){

 const byName=Object.fromEntries(FERTILIZER_PROTOCOL.map(x=>[x.name,x]));
 for(const omFactor of factors)for(const nFactor of factors)for(const pFactor of factors)for(const kFactor of factors){
  for(let i=1;i<STAGES.length;i++){
   const baseOrganic=byName['Phân hữu cơ'].doses[i]||0;
   const baseNpk=byName['NPK 15-15-15'].doses[i]||0;
   const baseUrea=byName['Urê'].doses[i]||0;
   const baseKcl=byName['KCl'].doses[i]||0;
   const baseK2so4=byName['K₂SO₄'].doses[i]||0;
   const adjustedNpk=baseNpk===0?0:baseNpk*pFactor;
   const deltaNpk=adjustedNpk-baseNpk;
   const adjustedOrganic=baseOrganic===0?0:baseOrganic*omFactor;
   const adjustedUrea=baseUrea===0?0:Math.max(0,baseUrea*nFactor-deltaNpk*0.15/0.46);
   const adjustedKcl=baseKcl===0?0:Math.max(0,baseKcl*kFactor-deltaNpk*0.15/0.60);
   const adjustedK2so4=baseK2so4===0?0:baseK2so4*kFactor;
   if((baseOrganic===0)!==(adjustedOrganic===0))throw new Error('Sai thời điểm bón phân hữu cơ tại '+STAGES[i]);
   if((baseNpk===0)!==(adjustedNpk===0))throw new Error('Sai thời điểm bón NPK tại '+STAGES[i]);
   if((baseUrea===0)!==(adjustedUrea===0))throw new Error('Sai thời điểm bón Urê tại '+STAGES[i]);
   if((baseKcl===0)!==(adjustedKcl===0))throw new Error('Sai thời điểm bón KCl tại '+STAGES[i]);
   if((baseK2so4===0)!==(adjustedK2so4===0))throw new Error('Sai thời điểm bón K₂SO₄ tại '+STAGES[i]);
   if(adjustedNpk>68.250001)throw new Error('NPK vượt 68,25 g/cây tại '+STAGES[i]);
  }
 }
}

 ];
 status('Đang tải dữ liệu bản đồ…');
 const results=await Promise.allSettled(jobs.map(j=>fetchFirst(j[1]))),errors=[];results.forEach((r,i)=>{if(r.status==='rejected')errors.push(jobs[i][0])});
 if(results[0].status==='fulfilled'){
  const data=results[0].value.data;
  const layer=L.geoJSON(data,{pane:'polygonPane',style:f=>({color:'#fff',weight:1.2,opacity:1,fillColor:getQualityColor(f),fillOpacity:.93,lineJoin:'round',lineCap:'round'}),onEachFeature:(f,l)=>{
   l.bindPopup(()=>'<div class="map-popup-table-wrap">'+createPopup(f)+'</div>',{maxWidth:470,maxHeight:650,autoPan:true,className:'clean-plot-popup'});
   const b=l.getBounds();if(b.isValid()){const nw=b.getNorthWest();L.marker(L.latLng(nw.lat-.00005,nw.lng+.00005),{pane:'labelPane',interactive:false,icon:L.divIcon({className:'thua-label',html:escapeHtml(getPlotLabel(f.properties)),iconSize:null})}).addTo(map)}
  }}).addTo(map);
  if(layer.getBounds().isValid())map.fitBounds(layer.getBounds(),{padding:[10,10]});
 }
 if(results[1].status==='fulfilled'){const d=results[1].value.data;L.geoJSON(d,{pane:'linePane',interactive:false,style:{color:'#fff',weight:4,opacity:1}}).addTo(map);L.geoJSON(d,{pane:'linePane',interactive:false,style:{color:'#29B6F6',weight:2,opacity:1}}).addTo(map)}
 if(results[2].status==='fulfilled')L.geoJSON(results[2].value.data,{pane:'ranhPane',interactive:false,style:{color:'#8B0000',weight:5,opacity:1,fill:false}}).addTo(map);
 if(results[3].status==='fulfilled')L.geoJSON(results[3].value.data,{pointToLayer:(f,ll)=>L.marker(ll,{pane:'labelPane',interactive:false,icon:L.divIcon({className:'xn-label',html:escapeHtml((f.properties&&f.properties.Name)||''),iconSize:[120,30]})})}).addTo(map);
 if(results[4].status==='fulfilled')L.geoJSON(results[4].value.data,{pointToLayer:(f,ll)=>L.marker(ll,{pane:'labelPane',interactive:false,icon:L.divIcon({className:'lo-label',html:escapeHtml((f.properties&&f.properties.Name)||''),iconSize:[22,22]})})}).addTo(map);
 if(errors.length)status('Bản đồ đã mở. Chưa tải được: '+errors.join(', ')+'. Các lớp này là tùy chọn; hãy kiểm tra tên file nếu cần.','warn');else status('','ok');
 setTimeout(()=>map.invalidateSize(),100);
}
init().catch(e=>status('Lỗi: '+e.message,'error'));
})();
</script>
</body>
</html>
