<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plantation Quality Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
}

#map{
    width:100%;
    height:100vh;
}

.popup-table{
    border-collapse:collapse;
    width:100%;
}

.popup-table td{
    border:1px solid #ddd;
    padding:4px 6px;
    font-size:12px;
    vertical-align:top;
}

.legend{
    background:white;
    padding:10px;
    border-radius:8px;
    box-shadow:0 0 8px rgba(0,0,0,.25);
    line-height:22px;
    font-size:13px;
}
.leaflet-interactive{
    transition:none;
}

.leaflet-interactive:hover{
}
.xn-label{
    color:#8B0000;
    font-size:20px;
    font-weight:700;
    text-shadow:
        1px 1px 2px white,
        -1px -1px 2px white,
        1px -1px 2px white,
        -1px 1px 2px white;
}
.thua-label{
    color:#000;
    font-size:12px;
    font-weight:700;
    white-space:nowrap;
    text-shadow:1px 1px 2px #fff,-1px -1px 2px #fff,1px -1px 2px #fff,-1px 1px 2px #fff;
}

.lo-label{
    width:22px;
    height:22px;
    line-height:22px;
    text-align:center;

    background:rgba(255,255,255,0.85);
    border:1.5px solid #003366;
    border-radius:50%;

    color:#003366;
    font-size:11px;
    font-weight:700;

    box-sizing:border-box;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script>

const map = L.map('map');
map.options.fadeAnimation = false;
map.options.zoomAnimation = false;

map.createPane('parcelShadowPane');
map.getPane('parcelShadowPane').style.zIndex=390;
map.getPane('parcelShadowPane').style.pointerEvents='none';
map.createPane('texturePane');
map.getPane('texturePane').style.zIndex=400;
map.createPane('polygonPane');
map.getPane('polygonPane').style.zIndex=445;
map.createPane('linePane');
map.getPane('linePane').style.zIndex=500;
map.createPane('ranhPane');
map.getPane('ranhPane').style.zIndex=600;
map.createPane('labelPane');
map.getPane('labelPane').style.zIndex=650;
map.getPane('popupPane').style.zIndex=7000;

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap'
}
).addTo(map);


// =====================
// LEGEND
// =====================

const legend = L.control({position:'bottomright'});

legend.onAdd = function(){

    const div = L.DomUtil.create('div','legend');

div.innerHTML = `

<span style="display:inline-block;width:14px;height:14px;background:#2E7D32;border:1px solid #666;"></span>
 Tốt <span style="font-size:11px;color:#666;">(Good)</span><br>

<span style="display:inline-block;width:14px;height:14px;background:#7CB342;border:1px solid #666;"></span>
 Trung bình <span style="font-size:11px;color:#666;">(Fair)</span><br>

<span style="display:inline-block;width:14px;height:14px;background:#D8F0C8;border:1px solid #666;"></span>
 Kém <span style="font-size:11px;color:#666;">(Poor)</span><br>

<span style="display:inline-block;width:14px;height:14px;background:#B59B3A;border:1px solid #666;"></span>
 Trồng mới <span style="font-size:11px;color:#666;">(New)</span><br>

<span style="display:inline-block;width:14px;height:14px;background:#D9D9D9;border:1px solid #666;"></span>
 <span style="font-size:11px;color:#666;">No Data</span>

`;
return div;
};
legend.addTo(map);


// =====================
// POPUP
// =====================

function createPopup(properties){

    let html = `
    <div style="
        max-height:350px;
        overflow-y:auto;
        overflow-x:hidden;
    ">
    <table class="popup-table">
    `;

    Object.entries(properties).forEach(([key,value])=>{

        if(value !== null && value !== ''){

            html += `
            <tr>
                <td><b>${key}</b></td>
                <td>${value}</td>
            </tr>
            `;
        }
    });

    html += `
    </table>
    </div>
    `;

    return html;
}


// =====================
// COLOR
// =====================

function getQualityColor(feature){

    const props = feature.properties;

    const quality = String(
        props["Chất lượng vườn (Plantation Quality)"] ||
        props["Plantation Quality"] ||
        props["CHAT_LUONG_VUON"] ||
        props["CL_VUON"] ||
        ''
    ).toLowerCase();

    // Tốt
    if(
        quality.includes('tốt') ||
        quality.includes('tot') ||
        quality.includes('good')
    ){
      return '#2E7D32';
    }

    // Trung bình
    if(
        quality.includes('trung bình') ||
        quality.includes('trung binh') ||
        quality.includes('fair') ||
        quality === 'tb'
    ){
        return '#7CB342';
    }

    // Kém
    if(
        quality.includes('kém') ||
        quality.includes('kem') ||
        quality.includes('poor')
    ){
       return '#D8F0C8';
    }

    // Trồng mới 
    if(
        quality.includes('trồng mới') ||
        quality.includes('trong moi') ||
        quality.includes('new') ||
        quality === 'tm'
    ){
        return '#B59B3A';
    }

    // Không có dữ liệu
    return '#D9D9D9';
}

function shadeColor(hex, percent){
    const n = parseInt(hex.replace('#',''),16);
    const amt = Math.round(2.55 * percent);
    const r = Math.max(0,Math.min(255,(n >> 16) + amt));
    const g = Math.max(0,Math.min(255,((n >> 8) & 0x00FF) + amt));
    const b = Math.max(0,Math.min(255,(n & 0x0000FF) + amt));
    return '#' + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
}

const textureRenderer = L.svg({pane:'texturePane', padding:0.5});
const tintRenderer = L.svg({pane:'polygonPane', padding:0.5});

function installBananaPatterns(){
    const svg = textureRenderer._container;
    if(!svg || svg.querySelector('#bananaRowsVertical')) return;

    const ns='http://www.w3.org/2000/svg';
    const xlink='http://www.w3.org/1999/xlink';
    const defs=document.createElementNS(ns,'defs');

    const filter=document.createElementNS(ns,'filter');
    filter.setAttribute('id','parcelLiftShadow');
    filter.setAttribute('x','-30%');
    filter.setAttribute('y','-30%');
    filter.setAttribute('width','170%');
    filter.setAttribute('height','170%');
    filter.innerHTML=`
      <feDropShadow dx="3" dy="5" stdDeviation="3.2"
        flood-color="#14220f" flood-opacity="0.62"/>
    `;
    defs.appendChild(filter);

    function makePattern(id, angle){
        const pattern=document.createElementNS(ns,'pattern');
        pattern.setAttribute('id',id);
        pattern.setAttribute('patternUnits','userSpaceOnUse');
        pattern.setAttribute('width','74');
        pattern.setAttribute('height','164');
        if(angle) pattern.setAttribute('patternTransform',`rotate(${angle})`);

        const image=document.createElementNS(ns,'image');
        image.setAttribute('x','0');
        image.setAttribute('y','0');
        image.setAttribute('width','74');
        image.setAttribute('height','164');
        image.setAttribute('preserveAspectRatio','xMidYMid slice');
        image.setAttributeNS(xlink,'href',BANANA_TEXTURE);
        image.setAttribute('href',BANANA_TEXTURE);
        pattern.appendChild(image);

        // Highlight and shade make each repeated row look slightly raised.
        const shine=document.createElementNS(ns,'rect');
        shine.setAttribute('x','0'); shine.setAttribute('y','0');
        shine.setAttribute('width','74'); shine.setAttribute('height','164');
        shine.setAttribute('fill','url(#bananaRowLight)');
        shine.setAttribute('opacity','0.24');
        pattern.appendChild(shine);
        defs.appendChild(pattern);
    }

    const grad=document.createElementNS(ns,'linearGradient');
    grad.setAttribute('id','bananaRowLight');
    grad.setAttribute('x1','0'); grad.setAttribute('x2','1');
    grad.setAttribute('y1','0'); grad.setAttribute('y2','0');
    grad.innerHTML=`
      <stop offset="0" stop-color="#071a07" stop-opacity=".36"/>
      <stop offset=".28" stop-color="#ffffff" stop-opacity=".10"/>
      <stop offset=".58" stop-color="#ffffff" stop-opacity=".23"/>
      <stop offset="1" stop-color="#071a07" stop-opacity=".38"/>
    `;
    defs.appendChild(grad);

    makePattern('bananaRowsVertical',0);
    makePattern('bananaRowsHorizontal',90);
    svg.insertBefore(defs,svg.firstChild);
}

function parcelPattern(feature){
    try{
        const coords=feature.geometry.type==='Polygon'
            ? feature.geometry.coordinates[0]
            : feature.geometry.coordinates[0][0];
        const xs=coords.map(p=>p[0]), ys=coords.map(p=>p[1]);
        const width=Math.max(...xs)-Math.min(...xs);
        const height=Math.max(...ys)-Math.min(...ys);
        return height >= width
            ? 'url(#bananaRowsVertical)'
            : 'url(#bananaRowsHorizontal)';
    }catch(e){
        return 'url(#bananaRowsVertical)';
    }
}

function styleTexturePath(layer, feature){
    const apply=()=>{
        installBananaPatterns();
        if(layer._path){
            layer._path.setAttribute('fill',parcelPattern(feature));
            layer._path.setAttribute('filter','url(#parcelLiftShadow)');
            layer._path.style.filter='url(#parcelLiftShadow)';
        }
    };
    apply();
    requestAnimationFrame(apply);
}

async function fetchGeoJSON(primary, fallback){
    for(const name of [primary,fallback]){
        try{
            const response=await fetch(name);
            if(response.ok) return await response.json();
        }catch(e){}
    }
    throw new Error('Không tải được '+primary);
}

fetchGeoJSON('Thua.geojson','Thua(2).geojson')
.then(data => {

    // Dark offset wall under every parcel gives a clear raised 3D edge.
    L.geoJSON(data,{
        pane:'parcelShadowPane',
        interactive:false,
        style:feature=>({
            color:'#182515', weight:6, opacity:0.56,
            fillColor:'#172214', fillOpacity:0.38,
            lineJoin:'round', lineCap:'round'
        })
    }).addTo(map);

    // Banana photograph is repeated and clipped independently by every parcel path.
    const textureLayer=L.geoJSON(data,{
        pane:'texturePane',
        renderer:textureRenderer,
        interactive:false,
        style:{
            color:'#e9f3dc', weight:1.2, opacity:0.84,
            fillColor:'#ffffff', fillOpacity:0.98,
            lineJoin:'round', lineCap:'round'
        },
        onEachFeature:(feature,layer)=>{
            layer.on('add',()=>styleTexturePath(layer,feature));
        }
    }).addTo(map);
    installBananaPatterns();

    // Transparent quality tint keeps the original thematic information visible.
    const layer = L.geoJSON(data,{
        pane:'polygonPane',
        renderer:tintRenderer,
        style: feature => ({
            color:'rgba(255,255,255,0.98)',
            weight:2.35,
            opacity:1,
            fillColor:getQualityColor(feature),
            fillOpacity:0.23,
            lineJoin:'round',
            lineCap:'round'
        }),
        onEachFeature:(feature,parcelLayer)=>{
            parcelLayer.bindPopup(createPopup(feature.properties));

            const bounds = parcelLayer.getBounds();
            const nw = bounds.getNorthWest();
            const pos = L.latLng(nw.lat - 0.00005, nw.lng + 0.00005);

            L.marker(pos,{
                pane:'labelPane',
                interactive:false,
                icon:L.divIcon({
                    className:'thua-label',
                    html:feature.properties["Thửa (Plot)"] || '',
                    iconSize:null
                })
            }).addTo(map);
        }
    }).addTo(map);

    map.fitBounds(layer.getBounds());
})
.catch(err => {
    console.error(err);
    alert('Không tìm thấy file Thua.geojson');
});
