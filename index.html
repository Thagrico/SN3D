<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plantation Quality Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
}

#map{
    width:100%;
    height:100vh;
}

.popup-table{
    border-collapse:collapse;
    width:100%;
}

.popup-table td{
    border:1px solid #ddd;
    padding:4px 6px;
    font-size:12px;
    vertical-align:top;
}

.legend{
    background:white;
    padding:10px;
    border-radius:8px;
    box-shadow:0 0 8px rgba(0,0,0,.25);
    line-height:22px;
    font-size:13px;
}
.leaflet-interactive{
    transition:none;
}

.leaflet-interactive:hover{
}

/* Bề mặt luống sần nhẹ, không tạo sóng đều như mái tôn */
.soil-texture{
    filter:url(#soilTextureFilter);
    pointer-events:none;
}

/* Viền thửa hai tầng, bo mềm và nổi rõ */
.plot-boundary-shadow{
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.35));
    pointer-events:none;
}
.plot-boundary-highlight{
    pointer-events:none;
}
.xn-label{
    color:#8B0000;
    font-size:20px;
    font-weight:700;
    text-shadow:
        1px 1px 2px white,
        -1px -1px 2px white,
        1px -1px 2px white,
        -1px 1px 2px white;
}
.thua-label{
    color:#000;
    font-size:12px;
    font-weight:700;
    white-space:nowrap;
    text-shadow:1px 1px 2px #fff,-1px -1px 2px #fff,1px -1px 2px #fff,-1px 1px 2px #fff;
}

.lo-label{
    width:22px;
    height:22px;
    line-height:22px;
    text-align:center;

    background:rgba(255,255,255,0.85);
    border:1.5px solid #003366;
    border-radius:50%;

    color:#003366;
    font-size:11px;
    font-weight:700;

    box-sizing:border-box;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script>

const map = L.map('map');
map.options.fadeAnimation = false;
map.options.zoomAnimation = false;

map.createPane('polygonPane');
map.getPane('polygonPane').style.zIndex=400;
map.createPane('linePane');
map.getPane('linePane').style.zIndex=500;
map.createPane('ranhPane');
map.getPane('ranhPane').style.zIndex=600;
map.createPane('labelPane');
map.getPane('labelPane').style.zIndex=650;
map.getPane('popupPane').style.zIndex=7000;

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap'
}
).addTo(map);


// =====================
// LEGEND
// =====================

const legend = L.control({position:'bottomright'});

legend.onAdd = function(){

    const div = L.DomUtil.create('div','legend');

div.innerHTML = `

<span style="display:inline-block;width:14px;height:14px;background:#2E7D32;border:1px solid #666;"></span>
 Tốt <span style="font-size:11px;color:#666;">(Good)</span><br>

<span style="display:inline-block;width:14px;height:14px;background:#7CB342;border:1px solid #666;"></span>
 Trung bình <span style="font-size:11px;color:#666;">(Fair)</span><br>

<span style="display:inline-block;width:14px;height:14px;background:#D8F0C8;border:1px solid #666;"></span>
 Kém <span style="font-size:11px;color:#666;">(Poor)</span><br>

<span style="display:inline-block;width:14px;height:14px;background:#B59B3A;border:1px solid #666;"></span>
 Trồng mới <span style="font-size:11px;color:#666;">(New)</span><br>

<span style="display:inline-block;width:14px;height:14px;background:#D9D9D9;border:1px solid #666;"></span>
 <span style="font-size:11px;color:#666;">No Data</span>

`;
return div;
};
legend.addTo(map);


// =====================
// POPUP
// =====================

function createPopup(properties){

    let html = `
    <div style="
        max-height:350px;
        overflow-y:auto;
        overflow-x:hidden;
    ">
    <table class="popup-table">
    `;

    Object.entries(properties).forEach(([key,value])=>{

        if(value !== null && value !== ''){

            html += `
            <tr>
                <td><b>${key}</b></td>
                <td>${value}</td>
            </tr>
            `;
        }
    });

    html += `
    </table>
    </div>
    `;

    return html;
}


// =====================
// COLOR
// =====================

function getQualityColor(feature){

    const props = feature.properties;

    const quality = String(
        props["Chất lượng vườn (Plantation Quality)"] ||
        props["Plantation Quality"] ||
        props["CHAT_LUONG_VUON"] ||
        props["CL_VUON"] ||
        ''
    ).toLowerCase();

    // Tốt
    if(
        quality.includes('tốt') ||
        quality.includes('tot') ||
        quality.includes('good')
    ){
      return '#2E7D32';
    }

    // Trung bình
    if(
        quality.includes('trung bình') ||
        quality.includes('trung binh') ||
        quality.includes('fair') ||
        quality === 'tb'
    ){
        return '#7CB342';
    }

    // Kém
    if(
        quality.includes('kém') ||
        quality.includes('kem') ||
        quality.includes('poor')
    ){
       return '#D8F0C8';
    }

    // Trồng mới 
    if(
        quality.includes('trồng mới') ||
        quality.includes('trong moi') ||
        quality.includes('new') ||
        quality === 'tm'
    ){
        return '#B59B3A';
    }

    // Không có dữ liệu
    return '#D9D9D9';
}

// =====================
// LOAD GEOJSON
// =====================

function installSoilTextureFilter(){

    const svg = map.getPanes().polygonPane.querySelector('svg');
    if(!svg || svg.querySelector('#soilTextureFilter')) return;

    const ns = 'http://www.w3.org/2000/svg';
    const defs = document.createElementNS(ns,'defs');

    defs.innerHTML = `
        <filter id="soilTextureFilter"
                x="-8%" y="-8%" width="116%" height="116%"
                color-interpolation-filters="sRGB">

            <feTurbulence
                type="fractalNoise"
                baseFrequency="0.035 0.12"
                numOctaves="3"
                seed="17"
                result="noise"/>

            <feDisplacementMap
                in="SourceGraphic"
                in2="noise"
                scale="1.7"
                xChannelSelector="R"
                yChannelSelector="G"
                result="roughShape"/>

            <feDiffuseLighting
                in="noise"
                surfaceScale="1.6"
                diffuseConstant="0.7"
                lighting-color="#f4ead2"
                result="light">
                <feDistantLight azimuth="225" elevation="48"/>
            </feDiffuseLighting>

            <feBlend
                in="roughShape"
                in2="light"
                mode="soft-light"
                result="textured"/>

            <feComponentTransfer in="textured">
                <feFuncR type="linear" slope="0.98" intercept="0.01"/>
                <feFuncG type="linear" slope="0.98" intercept="0.01"/>
                <feFuncB type="linear" slope="0.98" intercept="0.01"/>
            </feComponentTransfer>
        </filter>
    `;

    svg.insertBefore(defs,svg.firstChild);
}

fetch('Thua.geojson')
.then(r => r.json())
.then(data => {

    const layer = L.geoJSON(data,{
        pane:'polygonPane',

        style: feature => ({
            color:'transparent',
            weight:0,
            fillColor:getQualityColor(feature),
            fillOpacity:0.92,
            lineJoin:'round',
            lineCap:'round'
        }),

        onEachFeature:(feature,plotLayer)=>{

            plotLayer.bindPopup(
                createPopup(feature.properties)
            );

            const bounds = plotLayer.getBounds();
            const nw = bounds.getNorthWest();
            const pos = L.latLng(
                nw.lat - 0.00005,
                nw.lng + 0.00005
            );

            L.marker(pos,{
                pane:'labelPane',
                interactive:false,
                icon:L.divIcon({
                    className:'thua-label',
                    html:feature.properties["Thửa (Plot)"] || '',
                    iconSize:null
                })
            }).addTo(map);
        }

    }).addTo(map);

    L.geoJSON(data,{
        pane:'polygonPane',
        interactive:false,
        style: feature => ({
            className:'soil-texture',
            color:'transparent',
            weight:0,
            fillColor:getQualityColor(feature),
            fillOpacity:0.42,
            lineJoin:'round',
            lineCap:'round'
        })
    }).addTo(map);

    installSoilTextureFilter();

    L.geoJSON(data,{
        pane:'linePane',
        interactive:false,
        style:{
            className:'plot-boundary-shadow',
            color:'#4B321C',
            weight:5.2,
            opacity:0.95,
            fill:false,
            lineJoin:'round',
            lineCap:'round'
        }
    }).addTo(map);

    L.geoJSON(data,{
        pane:'linePane',
        interactive:false,
        style:{
            className:'plot-boundary-highlight',
            color:'#F3E3B6',
            weight:1.65,
            opacity:0.95,
            fill:false,
            lineJoin:'round',
            lineCap:'round'
        }
    }).addTo(map);

    map.fitBounds(layer.getBounds());

})
.catch(err => {
    console.error(err);

    alert(
        'Không tìm thấy file Thua.geojson'
    );

});

// =====================
// LINE LO
// =====================
fetch('Line_lo.geojson')
.then(r=>r.json())
.then(data=>{
 L.geoJSON(data,{pane:'linePane',style:{color:'#ffffff',weight:4,opacity:1}}).addTo(map);
 L.geoJSON(data,{pane:'linePane',style:{color:'#29B6F6',weight:2,opacity:1}}).addTo(map);
})
.catch(err=>console.log(err));

// =====================
// RANH XN
// =====================

fetch('Ranh_xn.geojson')
.then(r => r.json())
.then(data => {

    const ranhXN = L.geoJSON(data,{
        pane:'ranhPane',
        style:{
            color:'#8B0000',
            weight:5,
            opacity:1,
            fill:false
        }
    }).addTo(map);


})
.catch(err => console.log(err));
// =====================
// TEN XN
// =====================

fetch('Ten_xn.geojson')
.then(r => r.json())
.then(data => {

    const tenXN = L.geoJSON(data,{
        pointToLayer:(feature,latlng)=>{

            return L.marker(latlng,{
                icon:L.divIcon({
                    className:'xn-label',
                    html:feature.properties.Name || '',
                    iconSize:[120,30]
                })
            });

        }
    }).addTo(map);

    tenXN.bringToFront();

})
.catch(err => console.log(err));  
// =====================
// TEXT LO
// =====================

fetch('Text_lo.geojson')
.then(r => r.json())
.then(data => {

    const textLo = L.geoJSON(data,{
        pointToLayer:(feature,latlng)=>{

            return L.marker(latlng,{
                icon:L.divIcon({
                    className:'lo-label',
                    html:feature.properties.Name || '',
                    iconSize:[22,22]
                })
            });

        }
    }).addTo(map);

    textLo.bringToFront();

})
.catch(err => console.log(err));

</script>

</body>
</html>
