async function loadLeaflet(){

function fetchJson(url,timeout=10000){return new Promise((resolve,reject)=>{const c=new AbortController();const t=setTimeout(()=>c.abort(),timeout);fetch(url,{cache:'no-store',signal:c.signal}).then(r=>{if(!r.ok)throw new Error(r.status+' '+r.statusText);return r.json()}).then(v=>{clearTimeout(t);resolve(v)}).catch(e=>{clearTimeout(t);reject(e)})})}
async function fetchFirst(candidates){let last;for(const name of candidates){try{return {data:await fetchJson(name),name}}catch(e){last=e}}throw new Error(candidates[0]+': '+(last?.message||'không tìm thấy'))}
function escapeHtml(v){return String(v).normalize('NFC').replace(/[&<>\"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#039;'}[c]))}

 };
 if(names[n])return names[n];

function monthEnglish(num){return ['','January','February','March','April','May','June','July','August','September','October','November','December'][num]||''}
function formatMonthValue(raw){const s=stripAccents(raw).replace(/\s+/g,' ').trim();let m=s.match(/^(?:thang|t)?\s*(1[0-2]|[1-9])$/);if(m){const num=Number(m[1]);return `Tháng ${num} (${monthEnglish(num)})`}m=s.match(/^(?:thang|t)?\s*(1[0-2]|[1-9])\s*[-–—/]\s*(?:thang|t)?\s*(1[0-2]|[1-9])$/);if(m){const a=Number(m[1]),b=Number(m[2]);return `Tháng ${a}–${b} (${monthEnglish(a)}–${monthEnglish(b)})`}return null}
function normalizeDegreeAndUnits(raw,key){let s=String(raw).normalize('NFC').trim(),kn=normalizedKey(key);s=s.replace(/\b(?:o|0|º|°)\s*c\b/gi,'°C');s=s.replace(/(-?\d+(?:[.,]\d+)?)\s*(?:o|0|º|°)\s*c\b/gi,'$1 °C');s=s.replace(/(-?\d+(?:[.,]\d+)?)\s*c\b/gi,'$1 °C');if(kn.includes('nhiet do')||/temperature/.test(kn)||/^(t\s*(min|max|tb|mean)|tmin|tmax|ttb|tmean)$/.test(kn)){if(/^[-+]?\d+(?:[.,]\d+)?$/.test(s))s+=' °C'}s=s.replace(/(-?\d+(?:[.,]\d+)?)\s*(?:o|º)\b/g,'$1°');s=s.replace(/\s*(cm|mm|km|ha|m²|m2|%|ppm|mg\/kg|mm\/năm|mm\/year)\b/gi,' $1');s=s.replace(/\bm2\b/gi,'m²');return s}
function formatValue(value,key=''){if(value===null||typeof value==='undefined')return '';let raw=String(value).normalize('NFC').trim();if(!raw)return '';if(/^dp3$/i.test(raw))return 'DP3';if(/^tpcg$/i.test(raw))return 'TPCG';if(/^ec$/i.test(raw))return 'EC';if(/^om$/i.test(raw))return 'OM';const n=stripAccents(raw).replace(/\s+/g,' ').trim(),kn=normalizedKey(key);if((kn.includes('do am')||kn==='doam'||kn.includes('moisture'))&&/^[-+]?\d+(?:[.,]\d+)?$/.test(raw))return raw+' %';if(kn.includes('thang')||kn.includes('mua mua')||kn.includes('mua kho')){const month=formatMonthValue(raw);if(month)return month}const exact={'tot':'Tốt (Good)','good':'Tốt (Good)','trung binh':'Trung bình (Fair)','tb':'Trung bình (Fair)','fair':'Trung bình (Fair)','kem':'Kém (Poor)','poor':'Kém (Poor)','trong moi':'Trồng mới (New plantation)','tm':'Trồng mới (New plantation)','new':'Trồng mới (New plantation)','ngap tb':'Ngập úng trung bình (Moderate waterlogging)','ngap trung binh':'Ngập úng trung bình (Moderate waterlogging)','ngap nhe':'Ngập úng nhẹ (Mild waterlogging)','ngap nang':'Ngập úng nặng (Severe waterlogging)','khong ngap':'Không ngập úng (No waterlogging)','cao':'Cao (High)','thap':'Thấp (Low)','co':'Có (Yes)','khong':'Không (No)','yes':'Có (Yes)','no':'Không (No)','dang sx':'Đang sản xuất (In production)','dang san xuat':'Đang sản xuất (In production)','nghi':'Ngừng sản xuất (Inactive)','nho giot':'Nhỏ giọt (Drip irrigation)','phun mua':'Phun mưa (Sprinkler irrigation)','tuoi tran':'Tưới tràn (Flood irrigation)','khong tuoi':'Không tưới (No irrigation)','cat':'Cát (Sand)','set':'Sét (Clay)','thit':'Thịt (Loam)','set cat':'Sét cát (Sandy clay)','cat set':'Cát sét (Clayey sand)','set thit':'Sét thịt (Clay loam)','thit set':'Thịt sét (Clay loam)','thit cat':'Thịt cát (Sandy loam)','cat thit':'Cát thịt (Sandy loam)','set thit cat':'Sét thịt cát (Sandy clay loam)'};if(exact[n])return exact[n];const month=formatMonthValue(raw);if(month&&(kn.includes('thang')||kn.includes('mua mua')||kn.includes('mua kho')||/^\s*(?:tháng|thang|t)\s*\d/i.test(raw)))return month;return normalizeDegreeAndUnits(raw,key)}

function getClassification(properties,indicator){
 const hit=findProperty(properties,indicator);if(!hit)return {level:'unknown',factor:1,display:'Không có dữ liệu',raw:null,value:null};
 const textLevel=classifyText(hit.value);if(textLevel)return {level:textLevel,factor:textLevel==='low'?1.05:textLevel==='high'?0.95:1,display:String(hit.value),raw:hit.value,value:null};
 let value=parseNumber(hit.value);if(value===null)return {level:'unknown',factor:1,display:String(hit.value),raw:hit.value,value:null};
 const rawText=stripAccents(hit.value);
 if(indicator==='N'&&(rawText.includes('ppm')||rawText.includes('mg/kg')||(!rawText.includes('%')&&value>5)))value=value/10000;
 const lim=SOIL_LIMITS[indicator];if(!lim)return {level:'unknown',factor:1,display:String(hit.value),raw:hit.value,value};
 const level=value<lim.low?'low':value>lim.high?'high':'medium';
 const shown=indicator==='N'?`${Number(value.toFixed(4))} %`:String(hit.value);
 return {level,factor:level==='low'?1.05:level==='high'?0.95:1,display:shown,raw:hit.value,value};
}
function levelVi(level){return level==='low'?'thấp':level==='medium'?'trung bình':level==='high'?'cao':'chưa có dữ liệu'}
function adjustmentText(item,c){
 /* Mg, Zn và B giữ nguyên nhưng không cần dòng giải thích trong bảng */
 if(item.locked)return null;
 if(c.level==='low')return {vi:`${item.indicator} thấp: +5%`,en:`Poor ${item.indicator}: +5%`,kind:'up'};
 if(c.level==='high')return {vi:`${item.indicator} cao: -5%`,en:`Rich ${item.indicator}: -5%`,kind:'down'};
 if(c.level==='medium')return {vi:`${item.indicator} TB: Theo quy trình`,en:`Fair ${item.indicator}: Standard rate`,kind:'same'};
 return {vi:`${item.indicator}: Theo quy trình`,en:`${item.indicator}: Standard rate`,kind:'same'};
}
function formatDose(v){if(!Number.isFinite(v)||v===0)return '0';if(v>=1000)return Math.round(v).toLocaleString('vi-VN');if(v>=100)return (Math.round(v*10)/10).toLocaleString('vi-VN',{maximumFractionDigits:1});return (Math.round(v*100)/100).toLocaleString('vi-VN',{maximumFractionDigits:2})}
function createFertilizerRecommendation(properties){
 const classes={};['OM','N','P','K'].forEach(k=>classes[k]=getClassification(properties,k));
 let html='<div class="fert-box">';
 html+='<div class="fert-title">Hướng dẫn bón phân<span class="fert-title-en">Fertilizer recommendation</span><span class="fert-unit">Đơn vị: g/cây</span><span class="fert-unit-en">Unit: g/tree</span></div>';
 html+='<div class="fert-table-wrap"><table class="fert-table"><thead><tr><th>Loại phân<span class="header-en">Fertilizer</span></th>';
 STAGES.forEach((s,i)=>{html+=`<th class="${i===0?'tm-cell':''}">${s}</th>`});html+='</tr></thead><tbody>';
 FERTILIZER_PROTOCOL.forEach(item=>{
  const c=item.locked?{factor:1,level:'locked'}:(classes[item.indicator]||{factor:1,level:'unknown'});
  const note=adjustmentText(item,c);
  const noteHtml=note?`<div class="fert-adjust-vi ${note.kind}">${escapeHtml(note.vi)}</div><div class="fert-adjust-en">${escapeHtml(note.en)}</div>`:'';
  html+=`<tr><td><div class="fert-name-vi">${escapeHtml(item.name)}</div><div class="fert-name-en">${escapeHtml(item.en)}</div>${noteHtml}</td>`;
  item.doses.forEach((base,i)=>{
   const locked=i===0||item.locked;
   const factor=locked?1:c.factor;
   const adjusted=base*factor;
   let cls=locked||factor===1?'unchanged':factor>1?'changed-up':'changed-down';if(i===0)cls+=' tm-cell';
   const title=i===0?'TM giữ nguyên / TM unchanged':(note?note.vi+' / '+note.en:'Giữ nguyên / Unchanged');
   html+=`<td class="${cls}" title="${escapeHtml(title)}">${formatDose(adjusted)}</td>`;
  });
  html+='</tr>';
 });
 html+='</tbody></table></div>';
 return html+'</div>';
}
function createPopup(feature){
 const properties=collectProperties(feature),entries=Object.entries(properties).filter(([,v])=>v!==null&&v!==''&&typeof v!=='undefined');
 let html='<table class="popup-table">';
 if(!entries.length)html+='<tr><td colspan="2">Thửa này không có dữ liệu thuộc tính.</td></tr>';
 else entries.forEach(([k,v])=>{html+=`<tr><td><b>${escapeHtml(formatFieldName(k))}</b></td><td>${escapeHtml(formatValue(v,k))}</td></tr>`});
 html+='</table>';
 return html+createFertilizerRecommendation(properties);
}
function getQualityColor(feature){const p=feature.properties||{},q=String(p['Chất lượng vườn (Plantation Quality)']||p['Plantation Quality']||p['CHAT_LUONG_VUON']||p['CL_VUON']||p['CL VUON']||'').toLowerCase();if(q.includes('tốt')||q.includes('tot')||q.includes('good'))return '#2E7D32';if(q.includes('trung bình')||q.includes('trung binh')||q.includes('fair')||q==='tb')return '#7CB342';if(q.includes('kém')||q.includes('kem')||q.includes('poor'))return '#D8F0C8';if(q.includes('trồng mới')||q.includes('trong moi')||q.includes('new')||q==='tm')return '#B59B3A';return '#D9D9D9'}
function getPlotLabel(properties){for(const k of ['Thửa (Plot)','THUA','Thua','thua','Plot'])if(properties&&properties[k]!==undefined&&properties[k]!==null)return properties[k];return ''}
async function init(){
 try{await loadLeaflet()}catch(e){status(e.message,'error');return}
 const map=L.map('map',{fadeAnimation:false,zoomAnimation:false,markerZoomAnimation:false,preferCanvas:true}).setView([11,106],7);
 [['polygonPane',400],['linePane',500],['ranhPane',600],['labelPane',650]].forEach(([n,z])=>{map.createPane(n);map.getPane(n).style.zIndex=z});
 map.getPane('linePane').style.pointerEvents='none';map.getPane('ranhPane').style.pointerEvents='none';map.getPane('labelPane').style.pointerEvents='none';map.getPane('polygonPane').style.pointerEvents='auto';map.getPane('popupPane').style.zIndex=7000;
 const tiles=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',updateWhenIdle:true,keepBuffer:1,maxZoom:19}).addTo(map);tiles.on('tileerror',()=>{});
 const legend=L.control({position:'bottomright'});legend.onAdd=()=>{const d=L.DomUtil.create('div','legend');d.innerHTML='<span style="display:inline-block;width:14px;height:14px;background:#2E7D32;border:1px solid #666"></span> Tốt <span style="font-size:11px;color:#666">(Good)</span><br><span style="display:inline-block;width:14px;height:14px;background:#7CB342;border:1px solid #666"></span> Trung bình <span style="font-size:11px;color:#666">(Fair)</span><br><span style="display:inline-block;width:14px;height:14px;background:#D8F0C8;border:1px solid #666"></span> Kém <span style="font-size:11px;color:#666">(Poor)</span><br><span style="display:inline-block;width:14px;height:14px;background:#B59B3A;border:1px solid #666"></span> Trồng mới <span style="font-size:11px;color:#666">(New)</span><br><span style="display:inline-block;width:14px;height:14px;background:#D9D9D9;border:1px solid #666"></span> <span style="font-size:11px;color:#666">No Data</span>';return d};legend.addTo(map);
 const jobs=[
  ['Thửa',['Thua(12).geojson','Thua.geojson','thua.geojson','Thua(10).geojson','Thua(8).geojson']],
  ['Đường lô',['Line_lo(9).geojson','Line_lo.geojson','line_lo.geojson','Line_lo(8).geojson']],
  ['Ranh xí nghiệp',['Ranh_xn(9).geojson','Ranh_xn.geojson','ranh_xn.geojson','Ranh_xn(8).geojson']],
  ['Tên xí nghiệp',['Ten_xn(9).geojson','Ten_xn.geojson','ten_xn.geojson','Ten_xn(8).geojson']],
  ['Số lô',['Text_lo(9).geojson','Text_lo.geojson','text_lo.geojson','Text_lo(8).geojson']]
 ];
 status('Đang tải dữ liệu bản đồ…');
 const results=await Promise.allSettled(jobs.map(j=>fetchFirst(j[1]))),errors=[];results.forEach((r,i)=>{if(r.status==='rejected')errors.push(jobs[i][0])});
 if(results[0].status==='fulfilled'){
  const data=results[0].value.data;
  const layer=L.geoJSON(data,{pane:'polygonPane',style:f=>({color:'#fff',weight:1.2,opacity:1,fillColor:getQualityColor(f),fillOpacity:.93,lineJoin:'round',lineCap:'round'}),onEachFeature:(f,l)=>{
   l.bindPopup(()=>'<div class="map-popup-table-wrap">'+createPopup(f)+'</div>',{maxWidth:470,maxHeight:650,autoPan:true,className:'clean-plot-popup'});
   const b=l.getBounds();if(b.isValid()){const nw=b.getNorthWest();L.marker(L.latLng(nw.lat-.00005,nw.lng+.00005),{pane:'labelPane',interactive:false,icon:L.divIcon({className:'thua-label',html:escapeHtml(getPlotLabel(f.properties)),iconSize:null})}).addTo(map)}
  }}).addTo(map);
  if(layer.getBounds().isValid())map.fitBounds(layer.getBounds(),{padding:[10,10]});
 }
 if(results[1].status==='fulfilled'){const d=results[1].value.data;L.geoJSON(d,{pane:'linePane',interactive:false,style:{color:'#fff',weight:4,opacity:1}}).addTo(map);L.geoJSON(d,{pane:'linePane',interactive:false,style:{color:'#29B6F6',weight:2,opacity:1}}).addTo(map)}
 if(results[2].status==='fulfilled')L.geoJSON(results[2].value.data,{pane:'ranhPane',interactive:false,style:{color:'#8B0000',weight:5,opacity:1,fill:false}}).addTo(map);
 if(results[3].status==='fulfilled')L.geoJSON(results[3].value.data,{pointToLayer:(f,ll)=>L.marker(ll,{pane:'labelPane',interactive:false,icon:L.divIcon({className:'xn-label',html:escapeHtml((f.properties&&f.properties.Name)||''),iconSize:[120,30]})})}).addTo(map);
 if(results[4].status==='fulfilled')L.geoJSON(results[4].value.data,{pointToLayer:(f,ll)=>L.marker(ll,{pane:'labelPane',interactive:false,icon:L.divIcon({className:'lo-label',html:escapeHtml((f.properties&&f.properties.Name)||''),iconSize:[22,22]})})}).addTo(map);
 if(errors.length)status('Bản đồ đã mở. Chưa tải được: '+errors.join(', ')+'. Các lớp này là tùy chọn; hãy kiểm tra tên file nếu cần.','warn');else status('','ok');
 setTimeout(()=>map.invalidateSize(),100);
}
init().catch(e=>status('Lỗi: '+e.message,'error'));
})();
</script>
