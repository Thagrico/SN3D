<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bản đồ thửa 3D</title>

<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
  background:#e8ece8;
}
#map{
  position:absolute;
  inset:0;
}
.maplibregl-popup{
  max-width:min(440px,88vw)!important;
}
.maplibregl-popup-content{
  padding:0;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,.28);
}
.popup-title{
  padding:10px 12px;
  background:#173f24;
  color:#fff;
  font-weight:700;
}
.popup-scroll{
  max-height:350px;
  overflow:auto;
  background:#fff;
}
.popup-table{
  border-collapse:collapse;
  width:100%;
}
.popup-table td{
  border-bottom:1px solid #e5e5e5;
  padding:6px 8px;
  font-size:12px;
  vertical-align:top;
  line-height:1.35;
}
.popup-table td:first-child{
  width:46%;
  background:#f7f8f7;
  font-weight:700;
}
.panel{
  position:absolute;
  z-index:10;
  top:12px;
  left:12px;
  width:min(280px,calc(100vw - 24px));
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(8px);
  border:1px solid rgba(0,0,0,.15);
  border-radius:12px;
  padding:12px;
  box-shadow:0 4px 18px rgba(0,0,0,.2);
  box-sizing:border-box;
}
.panel h1{
  margin:0 0 8px;
  font-size:16px;
  color:#173f24;
}
.control-row{
  display:grid;
  grid-template-columns:90px 1fr 42px;
  align-items:center;
  gap:8px;
  margin-top:8px;
  font-size:12px;
}
.control-row input[type="range"]{
  width:100%;
}
.value{
  text-align:right;
  font-weight:700;
  color:#173f24;
}
.switch-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-top:8px;
  font-size:12px;
}
.switch-row input{
  width:18px;
  height:18px;
}
.buttons{
  display:flex;
  gap:8px;
  margin-top:10px;
}
.buttons button{
  border:0;
  border-radius:8px;
  padding:8px 10px;
  cursor:pointer;
  font-weight:700;
  font-size:12px;
}
#resetView{
  background:#173f24;
  color:white;
}
#togglePanel{
  display:none;
  position:absolute;
  z-index:11;
  top:10px;
  left:10px;
  border:0;
  border-radius:8px;
  padding:9px 11px;
  background:#173f24;
  color:#fff;
  font-weight:700;
}
.legend{
  position:absolute;
  z-index:9;
  right:10px;
  bottom:28px;
  background:rgba(255,255,255,.94);
  border:1px solid rgba(0,0,0,.14);
  border-radius:10px;
  padding:9px 11px;
  box-shadow:0 3px 14px rgba(0,0,0,.18);
  font-size:12px;
  line-height:20px;
}
.legend-item{
  display:flex;
  align-items:center;
  gap:7px;
  white-space:nowrap;
}
.swatch{
  width:14px;
  height:14px;
  border:1px solid #666;
  box-sizing:border-box;
}
.note{
  margin-top:8px;
  padding-top:8px;
  border-top:1px solid #ddd;
  color:#555;
  font-size:11px;
  line-height:1.35;
}
.status{
  position:absolute;
  z-index:20;
  inset:50% auto auto 50%;
  transform:translate(-50%,-50%);
  background:rgba(20,40,24,.92);
  color:#fff;
  border-radius:10px;
  padding:12px 16px;
  font-size:13px;
}
@media (max-width:680px){
  .panel{
    top:8px;
    left:8px;
    width:calc(100vw - 16px);
    padding:10px;
  }
  .panel.collapsed{
    display:none;
  }
  #togglePanel{
    display:block;
  }
  .legend{
    right:6px;
    bottom:24px;
    padding:7px 9px;
    font-size:11px;
    line-height:18px;
  }
}
</style>
</head>

<body>
<div id="map"></div>
<div id="status" class="status">Đang dựng bản đồ 3D…</div>

<button id="togglePanel" type="button">Điều khiển 3D</button>

<section id="panel" class="panel" aria-label="Điều khiển bản đồ 3D">
  <h1>Bản đồ thửa – chế độ luống 3D</h1>

  <div class="control-row">
    <label for="heightRange">Độ cao luống</label>
    <input id="heightRange" type="range" min="0" max="40" step="1" value="16">
    <span id="heightValue" class="value">16 m</span>
  </div>

  <div class="control-row">
    <label for="pitchRange">Góc nghiêng</label>
    <input id="pitchRange" type="range" min="0" max="70" step="1" value="58">
    <span id="pitchValue" class="value">58°</span>
  </div>

  <div class="control-row">
    <label for="bearingRange">Góc xoay</label>
    <input id="bearingRange" type="range" min="-180" max="180" step="1" value="-18">
    <span id="bearingValue" class="value">-18°</span>
  </div>

  <div class="switch-row">
    <label for="labelsToggle">Hiện số thửa và số lô</label>
    <input id="labelsToggle" type="checkbox" checked>
  </div>

  <div class="switch-row">
    <label for="baseToggle">Hiện nền bản đồ</label>
    <input id="baseToggle" type="checkbox" checked>
  </div>

  <div class="buttons">
    <button id="resetView" type="button">Đặt lại góc nhìn</button>
  </div>

  <div class="note">
    Kéo chuột phải hoặc giữ Ctrl + kéo để nghiêng/xoay. Bấm vào thửa để xem thông tin.
  </div>
</section>

<aside class="legend" aria-label="Chú giải chất lượng vườn">
  <div class="legend-item"><span class="swatch" style="background:#2E7D32"></span>Tốt (Good)</div>
  <div class="legend-item"><span class="swatch" style="background:#7CB342"></span>Trung bình (Fair)</div>
  <div class="legend-item"><span class="swatch" style="background:#D8F0C8"></span>Kém (Poor)</div>
  <div class="legend-item"><span class="swatch" style="background:#B59B3A"></span>Trồng mới (New)</div>
  <div class="legend-item"><span class="swatch" style="background:#D9D9D9"></span>Không có dữ liệu</div>
</aside>

function escapeHtml(value){
  return String(value ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#039;');
}

function createPopup(properties){
  const hidden = new Set([
    '__quality_label','__quality_color','__side_color','__feature_id'
  ]);

  const plot = properties['Thửa (Plot)'] || '';
  const lot = properties['Lô (Lot)'] || '';
  let rows = '';

  Object.entries(properties).forEach(([key,value]) => {
    if(hidden.has(key) || value === null || value === '') return;
    rows += `<tr><td>${escapeHtml(key)}</td><td>${escapeHtml(value)}</td></tr>`;
  });

  return `
    <div class="popup-title">Lô ${escapeHtml(lot)} – Thửa ${escapeHtml(plot)}</div>
    <div class="popup-scroll">
      <table class="popup-table">${rows}</table>
    </div>`;
}

function setExtrusionHeight(height){
  const h = Number(height);
  const capDepth = Math.min(2.2, Math.max(0.7, h * 0.14));
  if(map.getLayer('thua-sides')){
    map.setPaintProperty('thua-sides','fill-extrusion-height',h);

    map.setPaintProperty('thua-top','fill-extrusion-base',Math.max(0,h-capDepth));
    map.setPaintProperty('thua-top','fill-extrusion-height',h);
  }
}

      position:[1.2,210,35]
    });

    map.addSource('thua',{type:'geojson',data:THUA_DATA});
    map.addSource('line-lo',{type:'geojson',data:LINE_LO_DATA});
    map.addSource('ranh-xn',{type:'geojson',data:RANH_XN_DATA});
    map.addSource('ten-xn',{type:'geojson',data:TEN_XN_DATA});
    map.addSource('text-lo',{type:'geojson',data:TEXT_LO_DATA});
    map.addSource('thua-label',{type:'geojson',data:THUA_LABEL_DATA});

    // Bóng nền lệch nhẹ giúp khối luống tách khỏi bản đồ.
    map.addLayer({
      id:'thua-shadow',
      type:'fill',
      source:'thua',
      paint:{
        'fill-color':'#000000',
        'fill-opacity':0.18,
        'fill-translate':[4,6],
        'fill-translate-anchor':'viewport'
      }
    });

    // Thành luống tối màu.
    map.addLayer({
      id:'thua-sides',
      type:'fill-extrusion',
      source:'thua',
      paint:{
        'fill-extrusion-color':['get','__side_color'],
        'fill-extrusion-height':DEFAULT_HEIGHT,
        'fill-extrusion-base':0,
        'fill-extrusion-opacity':0.96,
        'fill-extrusion-vertical-gradient':true
      }
    });

    // Lớp nắp mỏng có màu chất lượng, tạo cảm giác luống cây nổi.
    map.addLayer({
      id:'thua-top',
      type:'fill-extrusion',
      source:'thua',
      paint:{
        'fill-extrusion-color':['get','__quality_color'],
        'fill-extrusion-height':DEFAULT_HEIGHT,
        'fill-extrusion-base':DEFAULT_HEIGHT-2,
        'fill-extrusion-opacity':0.98,
        'fill-extrusion-vertical-gradient':false
      }
    });

    map.addLayer({
      id:'line-lo-outline',
      type:'line',
      source:'line-lo',
      paint:{
        'line-color':'#ffffff',
        'line-width':4,
        'line-opacity':1
      }
    });

    map.addLayer({
      id:'line-lo',
      type:'line',
      source:'line-lo',
      paint:{
        'line-color':'#29B6F6',
        'line-width':2,
        'line-opacity':1
      }
    });

    map.addLayer({
      id:'ranh-xn',
      type:'line',
      source:'ranh-xn',
      paint:{
        'line-color':'#8B0000',
        'line-width':5,
        'line-opacity':1
      }
    });

    map.addLayer({
      id:'text-lo-circle',
      type:'circle',
      source:'text-lo',
      paint:{
        'circle-radius':11,
        'circle-color':'rgba(255,255,255,0.9)',
        'circle-stroke-color':'#003366',
        'circle-stroke-width':1.5
      }
    });

    map.addLayer({
      id:'text-lo-label',
      type:'symbol',
      source:'text-lo',
      layout:{
        'text-field':['coalesce',['get','Name'],''],
        'text-size':11,
        'text-font':['Open Sans Regular'],
        'text-allow-overlap':true,
        'text-ignore-placement':true
      },
      paint:{
        'text-color':'#003366',
        'text-halo-color':'rgba(255,255,255,0.9)',
        'text-halo-width':0.6
      }
    });

    map.addLayer({
      id:'thua-label',
      type:'symbol',
      source:'thua-label',
      layout:{
        'text-field':['get','label'],
        'text-size':12,
        'text-font':['Open Sans Regular'],
        'text-anchor':'top-left',
        'text-allow-overlap':true,
        'text-ignore-placement':true
      },
      paint:{
        'text-color':'#111111',
        'text-halo-color':'#ffffff',
        'text-halo-width':1.7,
        'text-halo-blur':0.2
      }
    });

    map.addLayer({
      id:'ten-xn-label',
      type:'symbol',
      source:'ten-xn',
      layout:{
        'text-field':['coalesce',['get','Name'],''],
        'text-size':20,
        'text-font':['Open Sans Regular'],
        'text-allow-overlap':true,
        'text-ignore-placement':true
      },
      paint:{
        'text-color':'#8B0000',
        'text-halo-color':'#ffffff',
        'text-halo-width':2.2
      }
    });

    map.fitBounds(DATA_BOUNDS,{
      padding:{top:90,right:60,bottom:70,left:60},
      pitch:DEFAULT_PITCH,
      bearing:DEFAULT_BEARING,
      duration:0
    });

    document.getElementById('status').style.display='none';
  }catch(error){
    console.error(error);
    const status = document.getElementById('status');
    status.textContent='Không thể dựng lớp 3D. Hãy kiểm tra kết nối Internet/WebGL.';
  }
});

map.on('click','thua-top',(event) => {
  const feature = event.features && event.features[0];
  if(!feature) return;

  new maplibregl.Popup({closeButton:true,maxWidth:'440px'})
    .setLngLat(event.lngLat)
    .setHTML(createPopup(feature.properties))
    .addTo(map);
});

map.on('mouseenter','thua-top',() => {
  map.getCanvas().style.cursor='pointer';
});
map.on('mouseleave','thua-top',() => {
  map.getCanvas().style.cursor='';
});

const heightRange = document.getElementById('heightRange');
const pitchRange = document.getElementById('pitchRange');
const bearingRange = document.getElementById('bearingRange');
const labelsToggle = document.getElementById('labelsToggle');
const baseToggle = document.getElementById('baseToggle');

heightRange.addEventListener('input',() => {
  document.getElementById('heightValue').textContent = `${heightRange.value} m`;
  setExtrusionHeight(heightRange.value);
});

pitchRange.addEventListener('input',() => {
  const value = Number(pitchRange.value);
  document.getElementById('pitchValue').textContent = `${value}°`;
  map.setPitch(value);
});

bearingRange.addEventListener('input',() => {
  const value = Number(bearingRange.value);
  document.getElementById('bearingValue').textContent = `${value}°`;
  map.setBearing(value);
});

map.on('pitch',() => {
  const p = Math.round(map.getPitch());
  pitchRange.value = p;
  document.getElementById('pitchValue').textContent = `${p}°`;
});
map.on('rotate',() => {
  const b = Math.round(map.getBearing());
  bearingRange.value = b;
  document.getElementById('bearingValue').textContent = `${b}°`;
});

labelsToggle.addEventListener('change',() => {
  const visible = labelsToggle.checked;
  ['thua-label','text-lo-circle','text-lo-label','ten-xn-label']
    .forEach(id => setLayerVisibility(id,visible));
});

baseToggle.addEventListener('change',() => {
  setLayerVisibility('osm-base',baseToggle.checked);
});

document.getElementById('resetView').addEventListener('click',() => {
  heightRange.value = DEFAULT_HEIGHT;
  pitchRange.value = DEFAULT_PITCH;
  bearingRange.value = DEFAULT_BEARING;
  document.getElementById('heightValue').textContent = `${DEFAULT_HEIGHT} m`;
  document.getElementById('pitchValue').textContent = `${DEFAULT_PITCH}°`;
  document.getElementById('bearingValue').textContent = `${DEFAULT_BEARING}°`;
  setExtrusionHeight(DEFAULT_HEIGHT);
  map.fitBounds(DATA_BOUNDS,{
    padding:{top:90,right:60,bottom:70,left:60},
    pitch:DEFAULT_PITCH,
    bearing:DEFAULT_BEARING,
    duration:700
  });
});

const panel = document.getElementById('panel');
document.getElementById('togglePanel').addEventListener('click',() => {
  panel.classList.toggle('collapsed');
});
</script>
</body>
</html>
