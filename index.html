<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plantation Quality Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
}

#map{
    width:100%;
    height:100vh;
}

.popup-table{
    border-collapse:collapse;
    width:100%;
}

.popup-table td{
    border:1px solid #ddd;
    padding:4px 6px;
    font-size:12px;
    vertical-align:top;
}

.legend{
    background:white;
    padding:10px;
    border-radius:8px;
    box-shadow:0 0 8px rgba(0,0,0,.25);
    line-height:22px;
    font-size:13px;
}
.leaflet-interactive{
    transition:none;
}

.leaflet-interactive:hover{
}
.xn-label{
    color:#8B0000;
    font-size:20px;
    font-weight:700;
    text-shadow:
        1px 1px 2px white,
        -1px -1px 2px white,
        1px -1px 2px white,
        -1px 1px 2px white;
}
.thua-label{
    color:#000;
    font-size:12px;
    font-weight:700;
    white-space:nowrap;
    text-shadow:1px 1px 2px #fff,-1px -1px 2px #fff,1px -1px 2px #fff,-1px 1px 2px #fff;
}

.lo-label{
    width:22px;
    height:22px;
    line-height:22px;
    text-align:center;

    background:rgba(255,255,255,0.85);
    border:1.5px solid #003366;
    border-radius:50%;

    color:#003366;
    font-size:11px;
    font-weight:700;

    box-sizing:border-box;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script>

const map = L.map('map');
map.options.fadeAnimation = false;
map.options.zoomAnimation = false;

map.createPane('parcelShadowPane');
map.getPane('parcelShadowPane').style.zIndex=390;
map.getPane('parcelShadowPane').style.pointerEvents='none';
map.createPane('texturePane');
map.getPane('texturePane').style.zIndex=400;
map.createPane('polygonPane');
map.getPane('polygonPane').style.zIndex=445;
map.createPane('linePane');
map.getPane('linePane').style.zIndex=500;
map.createPane('ranhPane');
map.getPane('ranhPane').style.zIndex=600;
map.createPane('labelPane');
map.getPane('labelPane').style.zIndex=650;
map.getPane('popupPane').style.zIndex=7000;

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap'
}
).addTo(map);


// =====================
// LEGEND
// =====================

const legend = L.control({position:'bottomright'});

legend.onAdd = function(){

    const div = L.DomUtil.create('div','legend');

div.innerHTML = `

<span style="display:inline-block;width:14px;height:14px;background:#2E7D32;border:1px solid #666;"></span>
 Tốt <span style="font-size:11px;color:#666;">(Good)</span><br>

<span style="display:inline-block;width:14px;height:14px;background:#7CB342;border:1px solid #666;"></span>
 Trung bình <span style="font-size:11px;color:#666;">(Fair)</span><br>

<span style="display:inline-block;width:14px;height:14px;background:#D8F0C8;border:1px solid #666;"></span>
 Kém <span style="font-size:11px;color:#666;">(Poor)</span><br>

<span style="display:inline-block;width:14px;height:14px;background:#B59B3A;border:1px solid #666;"></span>
 Trồng mới <span style="font-size:11px;color:#666;">(New)</span><br>

<span style="display:inline-block;width:14px;height:14px;background:#D9D9D9;border:1px solid #666;"></span>
 <span style="font-size:11px;color:#666;">No Data</span>

`;
return div;
};
legend.addTo(map);


// =====================
// POPUP
// =====================

function createPopup(properties){

    let html = `
    <div style="
        max-height:350px;
        overflow-y:auto;
        overflow-x:hidden;
    ">
    <table class="popup-table">
    `;

    Object.entries(properties).forEach(([key,value])=>{

        if(value !== null && value !== ''){

            html += `
            <tr>
                <td><b>${key}</b></td>
                <td>${value}</td>
            </tr>
            `;
        }
    });

    html += `
    </table>
    </div>
    `;

    return html;
}


// =====================
// COLOR
// =====================

function getQualityColor(feature){

    const props = feature.properties;

    const quality = String(
        props["Chất lượng vườn (Plantation Quality)"] ||
        props["Plantation Quality"] ||
        props["CHAT_LUONG_VUON"] ||
        props["CL_VUON"] ||
        ''
    ).toLowerCase();

    // Tốt
    if(
        quality.includes('tốt') ||
        quality.includes('tot') ||
        quality.includes('good')
    ){
      return '#2E7D32';
    }

    // Trung bình
    if(
        quality.includes('trung bình') ||
        quality.includes('trung binh') ||
        quality.includes('fair') ||
        quality === 'tb'
    ){
        return '#7CB342';
    }

    // Kém
    if(
        quality.includes('kém') ||
        quality.includes('kem') ||
        quality.includes('poor')
    ){
       return '#D8F0C8';
    }

    // Trồng mới 
    if(
        quality.includes('trồng mới') ||
        quality.includes('trong moi') ||
        quality.includes('new') ||
        quality === 'tm'
    ){
        return '#B59B3A';
    }

    // Không có dữ liệu
    return '#D9D9D9';
}

function getQualityOpacity(feature){

    const props = feature.properties;

    const quality = String(
        props["Chất lượng vườn (Plantation Quality)"] ||
        props["Plantation Quality"] ||
        props["CHAT_LUONG_VUON"] ||
        props["CL_VUON"] ||
        ''
    ).toLowerCase();

    if(
        quality.includes('trồng mới') ||
        quality.includes('trong moi') ||
        quality.includes('new') ||
        quality === 'tm'
    ){
        return 0.16;
    }

    return 0.23;
}

// =====================
// 3D PARCELS + LIGHTWEIGHT VECTOR BANANA ROWS
// =====================

// Không dùng ảnh PNG/base64. Mỗi kiểu luống chỉ được định nghĩa một lần trong
// SVG <defs>, sau đó trình duyệt tái sử dụng cho mọi thửa nên nhẹ hơn nhiều.
const BANANA_DETAIL_ZOOM = 17;
const bananaTextureItems = [];

const textureRenderer = L.svg({pane:'texturePane', padding:0.35});
const tintRenderer = L.svg({pane:'polygonPane', padding:0.35});

function installBananaPatterns(){
    const svg = textureRenderer._container;
    if(!svg) return;

    const ns='http://www.w3.org/2000/svg';
    let defs=svg.querySelector('defs');
    if(!defs){
        defs=document.createElementNS(ns,'defs');
        svg.insertBefore(defs,svg.firstChild);
    }

    if(!svg.querySelector('#bananaRidgeGradientV6')){
        // V6: tạo luống theo từng thửa thay vì pattern lặp đều toàn bản đồ.
        // Mục tiêu: mỗi thửa có ít nhất 3 luống, thường nhiều hơn nếu thửa rộng.
        const ridgeGrad=document.createElementNS(ns,'linearGradient');
        ridgeGrad.setAttribute('id','bananaRidgeGradientV6');
        ridgeGrad.setAttribute('x1','0'); ridgeGrad.setAttribute('x2','1');
        ridgeGrad.setAttribute('y1','0'); ridgeGrad.setAttribute('y2','0');
        ridgeGrad.innerHTML=`
          <stop offset="0" stop-color="#334a26"/>
          <stop offset=".12" stop-color="#52703a"/>
          <stop offset=".30" stop-color="#73914d"/>
          <stop offset=".48" stop-color="#90ad63"/>
          <stop offset=".56" stop-color="#9fba70"/>
          <stop offset=".72" stop-color="#7c9950"/>
          <stop offset=".88" stop-color="#58763c"/>
          <stop offset="1" stop-color="#3a512b"/>
        `;
        defs.appendChild(ridgeGrad);

        const furrowGrad=document.createElementNS(ns,'linearGradient');
        furrowGrad.setAttribute('id','bananaFurrowGradientV6');
        furrowGrad.setAttribute('x1','0'); furrowGrad.setAttribute('x2','1');
        furrowGrad.setAttribute('y1','0'); furrowGrad.setAttribute('y2','0');
        furrowGrad.innerHTML=`
          <stop offset="0" stop-color="#9f9971"/>
          <stop offset=".5" stop-color="#b7b183"/>
          <stop offset="1" stop-color="#989269"/>
        `;
        defs.appendChild(furrowGrad);
    }
}

function buildBananaPatternForLayer(layer, feature){
    installBananaPatterns();
    const svg = textureRenderer._container;
    const defs = svg && svg.querySelector('defs');
    if(!svg || !defs || !layer._path) return null;

    const ns='http://www.w3.org/2000/svg';
    const box=layer._path.getBBox();
    const vertical=parcelIsVertical(feature);
    const shortAxis=Math.max(18, vertical ? box.width : box.height);
    const longAxis=Math.max(24, vertical ? box.height : box.width);
    const detailed=map.getZoom() >= BANANA_DETAIL_ZOOM;

    // Thửa nào cũng có tối thiểu 3 luống; thửa rộng sẽ tự tăng thêm số luống.
    let ridgeCount=Math.max(3, Math.round(shortAxis / 26));
    ridgeCount=Math.min(ridgeCount, 18);

    const furrowRatio=0.24; // rãnh hẹp hơn luống nhưng vẫn thấy rõ
    const ridgeSize=shortAxis / (ridgeCount + (ridgeCount - 1) * furrowRatio);
    const furrowSize=ridgeSize * furrowRatio;

    const patternId=`bananaRows_${L.stamp(layer)}_${vertical ? 'v' : 'h'}_${detailed ? 'd' : 's'}_${Math.round(shortAxis)}`;
    const old = defs.querySelector(`#${patternId}`);
    if(old) return `url(#${patternId})`;

    const p=document.createElementNS(ns,'pattern');
    p.setAttribute('id',patternId);
    p.setAttribute('patternUnits','userSpaceOnUse');

    if(vertical){
        p.setAttribute('x', box.x);
        p.setAttribute('y', box.y);
        p.setAttribute('width', shortAxis);
        p.setAttribute('height', Math.min(Math.max(longAxis, 48), 180));
    }else{
        p.setAttribute('x', box.x);
        p.setAttribute('y', box.y);
        p.setAttribute('width', Math.min(Math.max(longAxis, 48), 180));
        p.setAttribute('height', shortAxis);
    }

    const fullW = parseFloat(p.getAttribute('width'));
    const fullH = parseFloat(p.getAttribute('height'));

    const bg=document.createElementNS(ns,'rect');
    bg.setAttribute('x','0');
    bg.setAttribute('y','0');
    bg.setAttribute('width', fullW);
    bg.setAttribute('height', fullH);
    bg.setAttribute('fill','url(#bananaFurrowGradientV6)');
    bg.setAttribute('opacity','.97');
    p.appendChild(bg);

    for(let i=0;i<ridgeCount;i++){
        const offset=i*(ridgeSize+furrowSize);
        const rect=document.createElementNS(ns,'rect');
        if(vertical){
            rect.setAttribute('x', offset);
            rect.setAttribute('y', -10);
            rect.setAttribute('width', ridgeSize);
            rect.setAttribute('height', fullH + 20);
        }else{
            rect.setAttribute('x', -10);
            rect.setAttribute('y', offset);
            rect.setAttribute('width', fullW + 20);
            rect.setAttribute('height', ridgeSize);
        }
        rect.setAttribute('fill','url(#bananaRidgeGradientV6)');
        p.appendChild(rect);

        // Viền chân luống nhẹ để gợi sườn dốc tự nhiên.
        const edge1=document.createElementNS(ns,'path');
        const edge2=document.createElementNS(ns,'path');
        const mid=document.createElementNS(ns,'path');
        if(vertical){
            edge1.setAttribute('d',`M${offset} -10V${fullH+10}`);
            edge2.setAttribute('d',`M${offset+ridgeSize} -10V${fullH+10}`);
            mid.setAttribute('d',`M${offset + ridgeSize/2} -10V${fullH+10}`);
        }else{
            edge1.setAttribute('d',`M-10 ${offset}H${fullW+10}`);
            edge2.setAttribute('d',`M-10 ${offset+ridgeSize}H${fullW+10}`);
            mid.setAttribute('d',`M-10 ${offset + ridgeSize/2}H${fullW+10}`);
        }
        edge1.setAttribute('stroke','#817b59');
        edge1.setAttribute('stroke-width','0.9');
        edge1.setAttribute('opacity','.34');
        edge2.setAttribute('stroke','#293c23');
        edge2.setAttribute('stroke-width','1.0');
        edge2.setAttribute('opacity','.17');
        mid.setAttribute('stroke','#e6ecb4');
        mid.setAttribute('stroke-width','1.0');
        mid.setAttribute('opacity','.13');
        edge1.setAttribute('fill','none');
        edge2.setAttribute('fill','none');
        mid.setAttribute('fill','none');
        p.appendChild(edge1);
        p.appendChild(edge2);
        p.appendChild(mid);

        if(detailed && ridgeSize > 9){
            const insetA=document.createElementNS(ns,'path');
            const insetB=document.createElementNS(ns,'path');
            if(vertical){
                insetA.setAttribute('d',`M${offset + ridgeSize*0.28} -10V${fullH+10}`);
                insetB.setAttribute('d',`M${offset + ridgeSize*0.72} -10V${fullH+10}`);
            }else{
                insetA.setAttribute('d',`M-10 ${offset + ridgeSize*0.28}H${fullW+10}`);
                insetB.setAttribute('d',`M-10 ${offset + ridgeSize*0.72}H${fullW+10}`);
            }
            insetA.setAttribute('stroke','#d4dda0');
            insetB.setAttribute('stroke','#223720');
            insetA.setAttribute('stroke-width','.55');
            insetB.setAttribute('stroke-width','.55');
            insetA.setAttribute('opacity','.06');
            insetB.setAttribute('opacity','.05');
            insetA.setAttribute('fill','none');
            insetB.setAttribute('fill','none');
            p.appendChild(insetA);
            p.appendChild(insetB);
        }
    }

    defs.appendChild(p);
    return `url(#${patternId})`;
}

function parcelIsVertical(feature){
    try{
        const coords=feature.geometry.type==='Polygon'
            ? feature.geometry.coordinates[0]
            : feature.geometry.coordinates[0][0];
        const xs=coords.map(p=>p[0]), ys=coords.map(p=>p[1]);
        return (Math.max(...ys)-Math.min(...ys)) >= (Math.max(...xs)-Math.min(...xs));
    }catch(e){
        return true;
    }
}

function styleTexturePath(layer, feature){
    const apply=()=>{
        if(layer._path){
            const fillRef=buildBananaPatternForLayer(layer, feature);
            if(fillRef) layer._path.setAttribute('fill', fillRef);
            layer._path.removeAttribute('filter');
            layer._path.style.filter='none';
        }
    };
    apply();
    requestAnimationFrame(apply);
}

function refreshBananaDetail(){
    bananaTextureItems.forEach(({layer,feature})=>{
        if(layer._path){
            const fillRef=buildBananaPatternForLayer(layer, feature);
            if(fillRef) layer._path.setAttribute('fill', fillRef);
        }
    });
}

map.on('zoomend',refreshBananaDetail);

async function fetchGeoJSON(...names){
    for(const name of names){
        try{
            const response=await fetch(name);
            if(response.ok) return await response.json();
        }catch(e){}
    }
    throw new Error('Không tải được '+names[0]);
}

// =====================
// LOAD GEOJSON
// =====================

fetchGeoJSON('Thua.geojson','Thua(4).geojson','Thua(2).geojson')
.then(data => {

    // Shadow under each parcel is softened so the parcel boundary stays visible without looking too harsh.
    L.geoJSON(data,{
        pane:'parcelShadowPane',
        interactive:false,
        style:feature=>({
            color:'#42503a', weight:3.0, opacity:0.15,
            fillColor:'#293523', fillOpacity:0.08,
            lineJoin:'round', lineCap:'round'
        })
    }).addTo(map);

    // Luống chuối vector nhẹ được lặp và cắt độc lập trong từng thửa.
    const textureLayer=L.geoJSON(data,{
        pane:'texturePane',
        renderer:textureRenderer,
        interactive:false,
        style:{
            color:'#afbc99', weight:0.55, opacity:0.28,
            fillColor:'#ffffff', fillOpacity:0.98,
            lineJoin:'round', lineCap:'round'
        },
        onEachFeature:(feature,layer)=>{
            bananaTextureItems.push({layer,feature});
            layer.on('add',()=>styleTexturePath(layer,feature));
        }
    }).addTo(map);
    installBananaPatterns();

    // Quality tint remains, while parcel boundaries stay softer and more natural.
    const layer = L.geoJSON(data,{
        pane:'polygonPane',
        renderer:tintRenderer,
        style: feature => ({
            color:'rgba(203,210,191,0.80)',
            weight:1.0,
            opacity:0.88,
            fillColor:getQualityColor(feature),
            fillOpacity:getQualityOpacity(feature),
            lineJoin:'round',
            lineCap:'round'
        }),
        onEachFeature:(feature,parcelLayer)=>{
            parcelLayer.bindPopup(createPopup(feature.properties));

            const bounds = parcelLayer.getBounds();
            const nw = bounds.getNorthWest();
            const pos = L.latLng(nw.lat - 0.00005, nw.lng + 0.00005);

            L.marker(pos,{
                pane:'labelPane',
                interactive:false,
                icon:L.divIcon({
                    className:'thua-label',
                    html:feature.properties["Thửa (Plot)"] || '',
                    iconSize:null
                })
            }).addTo(map);
        }
    }).addTo(map);

    map.fitBounds(layer.getBounds());
})
.catch(err => {
    console.error(err);
    alert('Không tìm thấy file Thua.geojson');
});

// =====================
// LINE LO
// =====================
fetchGeoJSON('Line_lo.geojson','Line_lo(4).geojson','Line_lo(2).geojson')
.then(data=>{
 L.geoJSON(data,{pane:'linePane',style:{color:'#ffffff',weight:4,opacity:1}}).addTo(map);
 L.geoJSON(data,{pane:'linePane',style:{color:'#29B6F6',weight:2,opacity:1}}).addTo(map);
})
.catch(err=>console.log(err));

// =====================
// RANH XN
// =====================

fetchGeoJSON('Ranh_xn.geojson','Ranh_xn(4).geojson','Ranh_xn(2).geojson')
.then(data => {

    const ranhXN = L.geoJSON(data,{
        pane:'ranhPane',
        style:{
            color:'#8B0000',
            weight:5,
            opacity:1,
            fill:false
        }
    }).addTo(map);


})
.catch(err => console.log(err));
// =====================
// TEN XN
// =====================

fetchGeoJSON('Ten_xn.geojson','Ten_xn(4).geojson','Ten_xn(2).geojson')
.then(data => {

    const tenXN = L.geoJSON(data,{
        pointToLayer:(feature,latlng)=>{

            return L.marker(latlng,{
                icon:L.divIcon({
                    className:'xn-label',
                    html:feature.properties.Name || '',
                    iconSize:[120,30]
                })
            });

        }
    }).addTo(map);

    tenXN.bringToFront();

})
.catch(err => console.log(err));  
// =====================
// TEXT LO
// =====================

fetchGeoJSON('Text_lo.geojson','Text_lo(4).geojson','Text_lo(2).geojson')
.then(data => {

    const textLo = L.geoJSON(data,{
        pointToLayer:(feature,latlng)=>{

            return L.marker(latlng,{
                icon:L.divIcon({
                    className:'lo-label',
                    html:feature.properties.Name || '',
                    iconSize:[22,22]
                })
            });

        }
    }).addTo(map);

    textLo.bringToFront();

})
.catch(err => console.log(err));

</script>

</body>
</html>
