<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bản đồ luống cây tự nhiên theo hướng từng thửa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
html,body{margin:0;padding:0;height:100%}
#map{width:100%;height:100vh;background:#d9e3d1}
.popup-table{border-collapse:collapse;width:100%}
.popup-table td{border:1px solid #ddd;padding:4px 6px;font-size:12px;vertical-align:top}
.legend{background:white;padding:10px;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,.25);line-height:22px;font-size:13px}
.leaflet-interactive{transition:none}
.xn-label{color:#8B0000;font-size:20px;font-weight:700;text-shadow:1px 1px 2px white,-1px -1px 2px white,1px -1px 2px white,-1px 1px 2px white}
.thua-label{color:#000;font-size:12px;font-weight:700;white-space:nowrap;text-shadow:1px 1px 2px #fff,-1px -1px 2px #fff,1px -1px 2px #fff,-1px 1px 2px #fff}
.lo-label{width:22px;height:22px;line-height:22px;text-align:center;background:rgba(255,255,255,.85);border:1.5px solid #003366;border-radius:50%;color:#003366;font-size:11px;font-weight:700;box-sizing:border-box}
.leaflet-quality-pane svg{mix-blend-mode:multiply}
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

const map=L.map('map',{
  fadeAnimation:false,
  zoomAnimation:false,
  markerZoomAnimation:false
});

function makePane(name,zIndex,pointerEvents='none'){
  map.createPane(name);
  const pane=map.getPane(name);
  pane.style.zIndex=String(zIndex);
  pane.style.pointerEvents=pointerEvents;
}

makePane('texturePane',400);
makePane('qualityPane',430);
makePane('plotBoundaryPane',470,'auto');
makePane('linePane',500);
makePane('ranhPane',600);
makePane('labelPane',650);
map.getPane('popupPane').style.zIndex='7000';

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap',
  maxZoom:21
}).addTo(map);

const legend=L.control({position:'bottomright'});
legend.onAdd=function(){
  const div=L.DomUtil.create('div','legend');
  div.innerHTML=`
    <span style="display:inline-block;width:14px;height:14px;background:#2E7D32;border:1px solid #666"></span> Tốt <span style="font-size:11px;color:#666">(Good)</span><br>
    <span style="display:inline-block;width:14px;height:14px;background:#7CB342;border:1px solid #666"></span> Trung bình <span style="font-size:11px;color:#666">(Fair)</span><br>
    <span style="display:inline-block;width:14px;height:14px;background:#D8F0C8;border:1px solid #666"></span> Kém <span style="font-size:11px;color:#666">(Poor)</span><br>
    <span style="display:inline-block;width:14px;height:14px;background:#B59B3A;border:1px solid #666"></span> Trồng mới <span style="font-size:11px;color:#666">(New)</span><br>
    <span style="display:inline-block;width:14px;height:14px;background:#D9D9D9;border:1px solid #666"></span> <span style="font-size:11px;color:#666">No Data</span>`;
  return div;
};
legend.addTo(map);

function escapeHTML(value){
  return String(value).replace(/[&<>'"]/g,ch=>({
    '&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'
  })[ch]);
}

function createPopup(properties={}){
  let html='<div style="max-height:350px;overflow-y:auto;overflow-x:hidden"><table class="popup-table">';
  Object.entries(properties).forEach(([key,value])=>{
    if(value!==null && value!=='' && typeof value!=='object'){
      html+=`<tr><td><b>${escapeHTML(key)}</b></td><td>${escapeHTML(value)}</td></tr>`;
    }
  });
  return html+'</table></div>';
}

function normalizeText(value){
  return String(value??'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
}

function getQualityColor(feature){
  const props=feature?.properties||{};
  const values=Object.values(props).map(normalizeText);
  const text=values.join(' | ');
  if(/trong moi|new planting|new/.test(text)) return '#B59B3A';
  if(/trung binh|fair|average|medium/.test(text)) return '#7CB342';
  if(/kem|poor|bad|weak/.test(text)) return '#D8F0C8';
  if(/tot|good|excellent/.test(text)) return '#2E7D32';
  return '#D9D9D9';
}

async function loadJSON(names){
  for(const name of names){
    try{
      const response=await fetch(name,{cache:'no-store'});
      if(response.ok) return await response.json();
    }catch(error){}
  }
  throw new Error('Không tải được: '+names.join(', '));
}

const textureRenderer=L.svg({padding:0.5,pane:'texturePane'});
const textureItems=[];

const PATTERN_DOC='luong-cay-doc-v3';
const PATTERN_NGANG='luong-cay-ngang-v3';
const DOC_W=128;
const DOC_H=88;

function svgNode(name,attrs={}){
  const node=document.createElementNS('http://www.w3.org/2000/svg',name);
  Object.entries(attrs).forEach(([key,value])=>node.setAttribute(key,String(value)));
  return node;
}

function addImageToPattern(pattern,attrs){
  const image=svgNode('image',attrs);
  image.setAttributeNS('http://www.w3.org/1999/xlink','href',LUONG_TILE);
  image.setAttribute('href',LUONG_TILE);
  image.setAttribute('preserveAspectRatio','none');
  image.setAttribute('image-rendering','auto');
  pattern.appendChild(image);
}

function installLuongDefs(){
  const svg=textureRenderer._container;
  if(!svg || svg.querySelector('#'+PATTERN_DOC)) return;

  let defs=svg.querySelector('defs');
  if(!defs){
    defs=svgNode('defs');
    svg.insertBefore(defs,svg.firstChild);
  }

  /*
   * Pattern dùng chung gốc tọa độ toàn bản đồ.
   * Vì vậy các luống cùng hướng vẫn thẳng hàng khi đi qua ranh thửa.
   */
  const vertical=svgNode('pattern',{
    id:PATTERN_DOC,
    patternUnits:'userSpaceOnUse',
    width:DOC_W,
    height:DOC_H,
    x:0,
    y:0
  });
  addImageToPattern(vertical,{x:0,y:0,width:DOC_W,height:DOC_H});
  defs.appendChild(vertical);

  /*
   * Dùng đúng ảnh trên nhưng xoay 90 độ cho các thửa có trục dài nằm ngang.
   * Kích thước đảo lại để cây và rãnh không bị kéo méo.
   */
  const horizontal=svgNode('pattern',{
    id:PATTERN_NGANG,
    patternUnits:'userSpaceOnUse',
    width:DOC_H,
    height:DOC_W,
    x:0,
    y:0
  });
  addImageToPattern(horizontal,{
    x:0,
    y:-DOC_H,
    width:DOC_W,
    height:DOC_H,
    transform:'rotate(90)'
  });
  defs.appendChild(horizontal);
}

function collectOuterCoordinates(geometry){
  if(!geometry) return [];
  if(geometry.type==='Polygon') return geometry.coordinates?.[0]||[];
  if(geometry.type==='MultiPolygon'){
    return (geometry.coordinates||[]).flatMap(polygon=>polygon?.[0]||[]);
  }
  return [];
}

/*
 * Xác định trục dài của từng thửa bằng PCA.
 * Thửa dọc dùng luống dọc; thửa ngang dùng luống ngang.
 */
function getParcelDirection(feature){
  const coords=collectOuterCoordinates(feature?.geometry);
  if(coords.length<3) return 'vertical';

  const meanLat=coords.reduce((sum,p)=>sum+Number(p[1]||0),0)/coords.length;
  const lonScale=Math.cos(meanLat*Math.PI/180)||1;
  const points=coords.map(([lon,lat])=>[Number(lon)*lonScale,Number(lat)]);
  const meanX=points.reduce((sum,p)=>sum+p[0],0)/points.length;
  const meanY=points.reduce((sum,p)=>sum+p[1],0)/points.length;

  let xx=0,yy=0,xy=0;
  for(const [x,y] of points){
    const dx=x-meanX;
    const dy=y-meanY;
    xx+=dx*dx;
    yy+=dy*dy;
    xy+=dx*dy;
  }

  if(Math.abs(xx-yy)<1e-16 && Math.abs(xy)<1e-16){
    const xs=points.map(p=>p[0]);
    const ys=points.map(p=>p[1]);
    return (Math.max(...ys)-Math.min(...ys)) >=
           (Math.max(...xs)-Math.min(...xs)) ? 'vertical' : 'horizontal';
  }

  const angle=0.5*Math.atan2(2*xy,xx-yy);
  return Math.abs(Math.sin(angle))>=Math.abs(Math.cos(angle))
    ? 'vertical'
    : 'horizontal';
}

function applyLuongPattern(layer,feature){
  if(!layer?._path) return;
  installLuongDefs();
  const id=getParcelDirection(feature)==='vertical'
    ? PATTERN_DOC
    : PATTERN_NGANG;

  layer._path.setAttribute('fill',`url(#${id})`);
  layer._path.setAttribute('fill-opacity','1');
}

function refreshPatterns(){
  textureItems.forEach(({layer,feature})=>applyLuongPattern(layer,feature));
}

map.on('zoomend viewreset moveend',()=>requestAnimationFrame(refreshPatterns));

loadJSON(['Thua(7).geojson','Thua.geojson'])
.then(data=>{
  const textureLayer=L.geoJSON(data,{
    pane:'texturePane',
    renderer:textureRenderer,
    interactive:false,
    style:{
      color:'#6e5a35',
      weight:0.55,
      opacity:0.45,
      fill:true,
      fillColor:'#8b7651',
      fillOpacity:1,
      lineJoin:'round',
      lineCap:'round'
    },
    onEachFeature:(feature,layer)=>{
      textureItems.push({layer,feature});
      layer.on('add',()=>requestAnimationFrame(()=>applyLuongPattern(layer,feature)));
    }
  }).addTo(map);

  installLuongDefs();
  requestAnimationFrame(refreshPatterns);

  L.geoJSON(data,{
    pane:'qualityPane',
    interactive:false,
    style:feature=>({
      color:'transparent',
      weight:0,
      fill:true,
      fillColor:getQualityColor(feature),
      fillOpacity:0.16
    })
  }).addTo(map);

  L.geoJSON(data,{
    pane:'plotBoundaryPane',
    style:{
      color:'rgba(255,255,255,.96)',
      weight:1.35,
      opacity:1,
      fill:false,
      lineJoin:'round',
      lineCap:'round'
    },
    onEachFeature:(feature,layer)=>{
      layer.bindPopup(createPopup(feature.properties||{}));
      const nw=layer.getBounds().getNorthWest();
      L.marker(L.latLng(nw.lat-.00005,nw.lng+.00005),{
        pane:'labelPane',
        interactive:false,
        icon:L.divIcon({
          className:'thua-label',
          html:escapeHTML((feature.properties||{})['Thửa (Plot)']||''),
          iconSize:null
        })
      }).addTo(map);
    }
  }).addTo(map);

  if(textureLayer.getBounds().isValid()){
    map.fitBounds(textureLayer.getBounds());
  }
})
.catch(error=>{
  console.error(error);
  alert('Không tìm thấy file Thua(7).geojson hoặc Thua.geojson');
});

loadJSON(['Line_lo(7).geojson','Line_lo.geojson'])
.then(data=>{
  L.geoJSON(data,{
    pane:'linePane',
    style:{color:'#ffffff',weight:4,opacity:1}
  }).addTo(map);

  L.geoJSON(data,{
    pane:'linePane',
    style:{color:'#29B6F6',weight:2,opacity:1}
  }).addTo(map);
})
.catch(error=>console.log(error));

loadJSON(['Ranh_xn(7).geojson','Ranh_xn.geojson'])
.then(data=>L.geoJSON(data,{
  pane:'ranhPane',
  style:{color:'#8B0000',weight:5,opacity:1,fill:false}
}).addTo(map))
.catch(error=>console.log(error));

loadJSON(['Ten_xn(7).geojson','Ten_xn.geojson'])
.then(data=>{
  const layer=L.geoJSON(data,{
    pane:'labelPane',
    pointToLayer:(feature,latlng)=>L.marker(latlng,{
      pane:'labelPane',
      icon:L.divIcon({
        className:'xn-label',
        html:escapeHTML((feature.properties||{}).Name||''),
        iconSize:[120,30]
      })
    })
  }).addTo(map);
  layer.bringToFront();
})
.catch(error=>console.log(error));

loadJSON(['Text_lo(7).geojson','Text_lo.geojson'])
.then(data=>{
  const layer=L.geoJSON(data,{
    pane:'labelPane',
    pointToLayer:(feature,latlng)=>L.marker(latlng,{
      pane:'labelPane',
      icon:L.divIcon({
        className:'lo-label',
        html:escapeHTML((feature.properties||{}).Name||''),
        iconSize:[22,22]
      })
    })
  }).addTo(map);
  layer.bringToFront();
})
.catch(error=>console.log(error));
</script>
