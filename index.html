<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bản đồ thửa – luống 3D bo tròn tự nhiên</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:#dfe7dd}
#map{position:absolute;inset:0}
.panel{position:absolute;z-index:10;top:12px;left:12px;width:min(320px,calc(100vw - 24px));background:rgba(255,255,255,.94);backdrop-filter:blur(9px);border:1px solid rgba(0,0,0,.14);border-radius:13px;padding:12px;box-shadow:0 5px 20px rgba(0,0,0,.2);box-sizing:border-box}
.panel h1{margin:0 0 5px;font-size:16px;color:#173f24}.subtitle{font-size:11px;color:#555;line-height:1.4;margin-bottom:7px}
.control-row{display:grid;grid-template-columns:112px 1fr 48px;align-items:center;gap:7px;margin-top:8px;font-size:12px}.control-row input{width:100%}.value{text-align:right;font-weight:700;color:#173f24}
.switch-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:8px;font-size:12px}.switch-row input{width:18px;height:18px}
.buttons{display:flex;gap:8px;margin-top:10px}.buttons button{border:0;border-radius:8px;padding:8px 10px;cursor:pointer;font-weight:700;font-size:12px;background:#173f24;color:#fff}
.note{margin-top:8px;padding-top:8px;border-top:1px solid #ddd;color:#555;font-size:11px;line-height:1.4}
.status{position:absolute;z-index:20;inset:50% auto auto 50%;transform:translate(-50%,-50%);background:rgba(20,40,24,.93);color:#fff;border-radius:10px;padding:12px 16px;font-size:13px}
.maplibregl-popup-content{padding:0;border-radius:10px;overflow:hidden}.popup-title{padding:10px 12px;background:#173f24;color:#fff;font-weight:700}.popup-body{padding:9px 11px;max-height:330px;overflow:auto;font-size:12px;line-height:1.45}.popup-body div{border-bottom:1px solid #eee;padding:4px 0}.popup-body b{display:inline-block;min-width:45%}
@media(max-width:680px){.panel{top:7px;left:7px;width:calc(100vw - 14px);padding:10px}}
</style>
</head>
<body>
<div id="map"></div>
<div id="status" class="status">Đang dựng luống bo tròn theo từng thửa…</div>

<section class="panel">
<h1>Luống cây 3D theo từng thửa</h1>
<div class="subtitle">Luống được dựng 3 tầng bo tròn như mô đất, chừa khe ở ranh thửa và không còn dạng thanh hộp vuông sắc cạnh.</div>

<div class="control-row"><label>Độ cao luống</label><input id="height" type="range" min="5" max="24" value="13"><span id="heightV" class="value">13 m</span></div>
<div class="control-row"><label>Khoảng cách luống</label><input id="spacing" type="range" min="10" max="32" value="18"><span id="spacingV" class="value">18 m</span></div>
<div class="control-row"><label>Độ rộng chân luống</label><input id="width" type="range" min="6" max="18" value="12"><span id="widthV" class="value">12 m</span></div>
<div class="control-row"><label>Khe ranh thửa</label><input id="edgeGap" type="range" min="1" max="8" value="3"><span id="edgeGapV" class="value">3 m</span></div>
<div class="control-row"><label>Góc nghiêng</label><input id="pitch" type="range" min="25" max="70" value="60"><span id="pitchV" class="value">60°</span></div>

<div class="switch-row"><label>Hiện ranh thửa</label><input id="borderToggle" type="checkbox" checked></div>
<div class="switch-row"><label>Hiện luống cây</label><input id="bedToggle" type="checkbox" checked></div>
<div class="buttons"><button id="rebuildBtn">Dựng lại luống</button><button id="resetBtn">Đặt lại góc nhìn</button></div>
<div class="note">Giữ nguyên các file GeoJSON. HTML tự nhận cả tên thường và tên có “(1)”.</div>
</section>

<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
<script>
const map = new maplibregl.Map({
  container:'map',
  style:{
    version:8,
    sources:{
      osm:{
        type:'raster',
        tiles:[
          'https://a.tile.openstreetmap.org/{z}/{x}/{y}.png',
          'https://b.tile.openstreetmap.org/{z}/{x}/{y}.png',
          'https://c.tile.openstreetmap.org/{z}/{x}/{y}.png'
        ],
        tileSize:256,
        attribution:'© OpenStreetMap'
      }
    },
    layers:[{
      id:'osm',type:'raster',source:'osm',
      paint:{'raster-opacity':.72,'raster-saturation':-.28,'raster-contrast':.08}
    }]
  },
  center:[106.603,12.239],
  zoom:15.8,
  pitch:60,
  bearing:-18,
  antialias:true
});

map.addControl(new maplibregl.NavigationControl({visualizePitch:true}),'bottom-right');

let thuaData=null;
let bedBaseData={type:'FeatureCollection',features:[]};
let bedMidData={type:'FeatureCollection',features:[]};
let bedTopData={type:'FeatureCollection',features:[]};

const qColor=p=>{
  const q=String(p['Chất lượng vườn (Plantation Quality)']||p['Plantation Quality']||'').toLowerCase();
  if(q.includes('good')||q.includes('tốt'))return '#2E7D32';
  if(q.includes('fair')||q.includes('trung'))return '#7CB342';
  if(q.includes('poor')||q.includes('kém'))return '#B8D7A5';
  if(q.includes('new')||q.includes('trồng mới'))return '#B59B3A';
  return '#8FA58D';
};

const shade=(hex,f)=>{
  const n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v*f))).toString(16).padStart(2,'0')).join('');
};

const lighten=(hex,f)=>{
  const n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  return '#'+[r,g,b].map(v=>Math.min(255,Math.round(v+(255-v)*f)).toString(16).padStart(2,'0')).join('');
};

function preparePlots(data){
  data.features.forEach((f,i)=>{
    const c=qColor(f.properties||{});
    f.id=i;
    f.properties={
      ...(f.properties||{}),
      __id:i,
      __color:c,
      __soil:shade(c,.48),
      __base:shade(c,.72),
      __mid:c,
      __top:lighten(c,.18)
    };
  });
  return data;
}

async function fetchFirst(names){
  let lastError;
  for(const name of names){
    try{
      const r=await fetch(name);
      if(r.ok)return await r.json();
      lastError=new Error('Không thấy '+name);
    }catch(e){lastError=e}
  }
  throw lastError||new Error('Không tải được dữ liệu');
}

function safeIntersect(a,b){
  try{return turf.intersect(turf.featureCollection([a,b]))}catch(e){return null}
}

function innerPlot(plot,gap){
  if(gap<=0)return plot;
  try{
    const x=turf.buffer(plot,-gap,{units:'meters',steps:24});
    return x||plot;
  }catch(e){return plot}
}

function createCenterSegments(plot,spacing,gap){
  const usable=innerPlot(plot,gap);
  const bb=turf.bbox(usable);
  const center=turf.centroid(usable).geometry.coordinates;
  const west=turf.point([bb[0],center[1]]),east=turf.point([bb[2],center[1]]);
  const south=turf.point([center[0],bb[1]]),north=turf.point([center[0],bb[3]]);
  const ew=turf.distance(west,east,{units:'meters'});
  const ns=turf.distance(south,north,{units:'meters'});
  const horizontal=ew>=ns;
  const long=Math.max(ew,ns)*1.7;
  const short=Math.min(ew,ns);
  const count=Math.ceil(short/spacing)+3;
  const result=[];

  for(let k=-count;k<=count;k++){
    const offset=k*spacing;
    let a,b;
    if(horizontal){
      const c=turf.destination(turf.point(center),offset,0,{units:'meters'}).geometry.coordinates;
      a=turf.destination(turf.point(c),long/2,270,{units:'meters'}).geometry.coordinates;
      b=turf.destination(turf.point(c),long/2,90,{units:'meters'}).geometry.coordinates;
    }else{
      const c=turf.destination(turf.point(center),offset,90,{units:'meters'}).geometry.coordinates;
      a=turf.destination(turf.point(c),long/2,180,{units:'meters'}).geometry.coordinates;
      b=turf.destination(turf.point(c),long/2,0,{units:'meters'}).geometry.coordinates;
    }

    const raw=turf.lineString([a,b]);
    const split=turf.lineSplit(raw,turf.polygonToLine(usable));

    for(const seg of split.features){
      const len=turf.length(seg,{units:'meters'});
      if(len<4)continue;
      const mid=turf.along(seg,len/2,{units:'meters'});
      if(turf.booleanPointInPolygon(mid,usable))result.push(seg);
    }
  }
  return {usable,segments:result};
}

function roundedBand(seg,usable,width,props){
  try{
    const capsule=turf.buffer(seg,width/2,{units:'meters',steps:32});
    const clipped=safeIntersect(capsule,usable);
    if(!clipped)return null;
    clipped.properties={...props};
    return clipped;
  }catch(e){return null}
}

function makeBeds(data,spacing,width,gap){
  const base=[],mid=[],top=[];
  for(const plot of data.features){
    try{
      const {usable,segments}=createCenterSegments(plot,spacing,gap);
      segments.forEach((seg,k)=>{
        const props={...plot.properties,__bed:k};
        const b=roundedBand(seg,usable,width,props);
        const m=roundedBand(seg,usable,width*.72,props);
        const t=roundedBand(seg,usable,width*.38,props);
        if(b)base.push(b);
        if(m)mid.push(m);
        if(t)top.push(t);
      });
    }catch(e){console.warn('Không dựng được một thửa',e)}
  }
  return {
    base:{type:'FeatureCollection',features:base},
    mid:{type:'FeatureCollection',features:mid},
    top:{type:'FeatureCollection',features:top}
  };
}

function popupHtml(p){
  let rows='';
  for(const [k,v] of Object.entries(p||{})){
    if(k.startsWith('__')||v==null||v==='')continue;
    rows+=`<div><b>${k}</b>${String(v)}</div>`;
  }
  return `<div class="popup-title">Lô ${p['Lô (Lot)']||''} – Thửa ${p['Thửa (Plot)']||''}</div><div class="popup-body">${rows}</div>`;
}

function addLayers(){
  const H=Number(height.value);

  map.addSource('plots',{type:'geojson',data:thuaData});
  map.addSource('bed-base-src',{type:'geojson',data:bedBaseData});
  map.addSource('bed-mid-src',{type:'geojson',data:bedMidData});
  map.addSource('bed-top-src',{type:'geojson',data:bedTopData});

  // Nền thửa thấp, không che ranh.
  map.addLayer({
    id:'plot-base',type:'fill-extrusion',source:'plots',
    paint:{
      'fill-extrusion-color':['get','__soil'],
      'fill-extrusion-height':2.2,
      'fill-extrusion-base':0,
      'fill-extrusion-opacity':.84,
      'fill-extrusion-vertical-gradient':true
    }
  });

  // Chân luống xòe rộng.
  map.addLayer({
    id:'bed-base',type:'fill-extrusion',source:'bed-base-src',
    paint:{
      'fill-extrusion-color':['get','__base'],
      'fill-extrusion-height':H*.50+2.2,
      'fill-extrusion-base':2.2,
      'fill-extrusion-opacity':.98,
      'fill-extrusion-vertical-gradient':true
    }
  });

  // Vai luống bo vào.
  map.addLayer({
    id:'bed-mid',type:'fill-extrusion',source:'bed-mid-src',
    paint:{
      'fill-extrusion-color':['get','__mid'],
      'fill-extrusion-height':H*.82+2.2,
      'fill-extrusion-base':H*.38+2.2,
      'fill-extrusion-opacity':.98,
      'fill-extrusion-vertical-gradient':true
    }
  });

  // Đỉnh luống hẹp, sáng và mềm.
  map.addLayer({
    id:'bed-top',type:'fill-extrusion',source:'bed-top-src',
    paint:{
      'fill-extrusion-color':['get','__top'],
      'fill-extrusion-height':H+2.2,
      'fill-extrusion-base':H*.70+2.2,
      'fill-extrusion-opacity':.99,
      'fill-extrusion-vertical-gradient':true
    }
  });

  // Đường sáng nhẹ giữa đỉnh luống.
  map.addLayer({
    id:'bed-highlight',type:'line',source:'bed-top-src',
    paint:{
      'line-color':['get','__top'],
      'line-width':1.2,
      'line-opacity':.72,
      'line-blur':.45,
      'line-z-offset':H+2.35
    }
  });

  // Ranh thửa luôn nằm cao hơn toàn bộ luống.
  map.addLayer({
    id:'border-shadow',type:'line',source:'plots',
    paint:{
      'line-color':'#1d1711',
      'line-width':10,
      'line-opacity':.52,
      'line-blur':2.4,
      'line-z-offset':H+4.7
    }
  });
  map.addLayer({
    id:'border-earth',type:'line',source:'plots',
    paint:{
      'line-color':'#6b4d31',
      'line-width':6.2,
      'line-opacity':1,
      'line-z-offset':H+5.4
    }
  });
  map.addLayer({
    id:'border-grass',type:'line',source:'plots',
    paint:{
      'line-color':'#8aa45b',
      'line-width':3.3,
      'line-opacity':1,
      'line-z-offset':H+5.9
    }
  });
  map.addLayer({
    id:'border-highlight',type:'line',source:'plots',
    paint:{
      'line-color':'#e0d7ba',
      'line-width':1.15,
      'line-opacity':.95,
      'line-z-offset':H+6.25
    }
  });

  ['bed-base','bed-mid','bed-top','plot-base'].forEach(id=>{
    map.on('click',id,e=>{
      const f=e.features&&e.features[0];
      if(f)new maplibregl.Popup().setLngLat(e.lngLat).setHTML(popupHtml(f.properties)).addTo(map);
    });
  });
}

function updateHeights(){
  const H=Number(height.value);
  if(map.getLayer('bed-base')){
    map.setPaintProperty('bed-base','fill-extrusion-height',H*.50+2.2);
    map.setPaintProperty('bed-mid','fill-extrusion-base',H*.38+2.2);
    map.setPaintProperty('bed-mid','fill-extrusion-height',H*.82+2.2);
    map.setPaintProperty('bed-top','fill-extrusion-base',H*.70+2.2);
    map.setPaintProperty('bed-top','fill-extrusion-height',H+2.2);
    map.setPaintProperty('bed-highlight','line-z-offset',H+2.35);
    [['border-shadow',4.7],['border-earth',5.4],['border-grass',5.9],['border-highlight',6.25]]
      .forEach(([id,z])=>map.setPaintProperty(id,'line-z-offset',H+z));
  }
}

function rebuildBeds(){
  if(!thuaData)return;
  status.style.display='block';
  status.textContent='Đang dựng lại luống bo tròn…';

  const made=makeBeds(
    thuaData,
    Number(spacing.value),
    Number(width.value),
    Number(edgeGap.value)
  );
  bedBaseData=made.base;
  bedMidData=made.mid;
  bedTopData=made.top;

  if(map.getSource('bed-base-src'))map.getSource('bed-base-src').setData(bedBaseData);
  if(map.getSource('bed-mid-src'))map.getSource('bed-mid-src').setData(bedMidData);
  if(map.getSource('bed-top-src'))map.getSource('bed-top-src').setData(bedTopData);

  updateHeights();
  status.style.display='none';
}

(async()=>{
  try{
    const raw=await fetchFirst(['Thua(1).geojson','Thua.geojson']);
    thuaData=preparePlots(raw);
    const made=makeBeds(thuaData,Number(spacing.value),Number(width.value),Number(edgeGap.value));
    bedBaseData=made.base; bedMidData=made.mid; bedTopData=made.top;

    map.on('load',()=>{
      addLayers();
      const bb=turf.bbox(thuaData);
      map.fitBounds([[bb[0],bb[1]],[bb[2],bb[3]]],{
        padding:55,pitch:Number(pitch.value),bearing:-18,duration:0
      });
      status.style.display='none';
    });
  }catch(e){
    status.textContent=(e.message||'Không tải được Thua.geojson')+' — hãy đặt HTML cùng thư mục dữ liệu.';
    console.error(e);
  }
})();

height.addEventListener('input',e=>{heightV.textContent=e.target.value+' m';updateHeights()});
spacing.addEventListener('input',e=>spacingV.textContent=e.target.value+' m');
width.addEventListener('input',e=>widthV.textContent=e.target.value+' m');
edgeGap.addEventListener('input',e=>edgeGapV.textContent=e.target.value+' m');
pitch.addEventListener('input',e=>{pitchV.textContent=e.target.value+'°';map.easeTo({pitch:Number(e.target.value),duration:100})});

rebuildBtn.onclick=rebuildBeds;
resetBtn.onclick=()=>{
  const bb=turf.bbox(thuaData);
  map.fitBounds([[bb[0],bb[1]],[bb[2],bb[3]]],{padding:55,pitch:60,bearing:-18,duration:500});
};

borderToggle.onchange=e=>['border-shadow','border-earth','border-grass','border-highlight']
  .forEach(id=>map.getLayer(id)&&map.setLayoutProperty(id,'visibility',e.target.checked?'visible':'none'));

bedToggle.onchange=e=>['bed-base','bed-mid','bed-top','bed-highlight']
  .forEach(id=>map.getLayer(id)&&map.setLayoutProperty(id,'visibility',e.target.checked?'visible':'none'));
</script>
</body>
</html>
