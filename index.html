<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plantation Quality Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
html,body{margin:0;padding:0;height:100%;}
#map{width:100%;height:100vh;background:#dfe8d8;}
.popup-table{border-collapse:collapse;width:100%;}
.popup-table td{border:1px solid #ddd;padding:4px 6px;font-size:12px;vertical-align:top;}
.legend{background:white;padding:10px;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,.25);line-height:22px;font-size:13px;}
.leaflet-interactive{transition:none;}
.xn-label{color:#8B0000;font-size:20px;font-weight:700;text-shadow:1px 1px 2px white,-1px -1px 2px white,1px -1px 2px white,-1px 1px 2px white;}
.thua-label{color:#000;font-size:12px;font-weight:700;white-space:nowrap;text-shadow:1px 1px 2px #fff,-1px -1px 2px #fff,1px -1px 2px #fff,-1px 1px 2px #fff;}
.lo-label{width:22px;height:22px;line-height:22px;text-align:center;background:rgba(255,255,255,.85);border:1.5px solid #003366;border-radius:50%;color:#003366;font-size:11px;font-weight:700;box-sizing:border-box;}
.global-row-texture{pointer-events:none;image-rendering:auto;}
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', {
    fadeAnimation:false,
    zoomAnimation:false,
    markerZoomAnimation:false
});

// Các pane tách riêng để ảnh luống không che ranh, nhãn và popup.
map.createPane('polygonPane');      map.getPane('polygonPane').style.zIndex = 400;
map.createPane('texturePane');      map.getPane('texturePane').style.zIndex = 420;
map.createPane('tintPane');         map.getPane('tintPane').style.zIndex = 430;
map.createPane('parcelBorderPane'); map.getPane('parcelBorderPane').style.zIndex = 450;
map.createPane('linePane');         map.getPane('linePane').style.zIndex = 500;
map.createPane('ranhPane');         map.getPane('ranhPane').style.zIndex = 600;
map.createPane('labelPane');        map.getPane('labelPane').style.zIndex = 650;
map.getPane('popupPane').style.zIndex = 7000;
map.getPane('texturePane').style.pointerEvents = 'none';
map.getPane('tintPane').style.pointerEvents = 'none';
map.getPane('parcelBorderPane').style.pointerEvents = 'none';

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap',
    maxZoom:22
}).addTo(map);

async function loadFirstAvailable(fileNames){
    let lastError = null;
    for(const fileName of fileNames){
        try{
            const response = await fetch(fileName, {cache:'no-store'});
            if(!response.ok) throw new Error(`${response.status} ${response.statusText}`);
            return await response.json();
        }catch(error){
            lastError = error;
        }
    }
    throw new Error(`Không tải được: ${fileNames.join(' hoặc ')}. ${lastError || ''}`);
}

function createPopup(properties){
    let html = '<div style="max-height:350px;overflow-y:auto;overflow-x:hidden"><table class="popup-table">';
    Object.entries(properties || {}).forEach(([key,value]) => {
        if(value !== null && value !== '') html += `<tr><td><b>${key}</b></td><td>${value}</td></tr>`;
    });
    return html + '</table></div>';
}

function getQualityColor(feature){
    const props = feature.properties || {};
    const quality = String(
        props['Chất lượng vườn (Plantation Quality)'] ||
        props['Plantation Quality'] ||
        props.CHAT_LUONG_VUON || props.CL_VUON || ''
    ).toLowerCase();

    if(quality.includes('tốt') || quality.includes('tot') || quality.includes('good')) return '#2E7D32';
    if(quality.includes('trung bình') || quality.includes('trung binh') || quality.includes('fair') || quality === 'tb') return '#7CB342';
    if(quality.includes('kém') || quality.includes('kem') || quality.includes('poor')) return '#D8F0C8';
    if(quality.includes('trồng mới') || quality.includes('trong moi') || quality.includes('new') || quality === 'tm') return '#B59B3A';
    return '#D9D9D9';
}

function outerRings(geometry){
    if(!geometry) return [];
    if(geometry.type === 'Polygon') return geometry.coordinates.length ? [geometry.coordinates[0]] : [];
    if(geometry.type === 'MultiPolygon') return geometry.coordinates.map(p => p[0]).filter(Boolean);
    return [];
}

// Tính một hướng chung cho toàn bộ nông trường. Mọi thửa dùng đúng một góc,
// vì vậy luống không bị xéo riêng từng thửa và luôn thẳng hàng liên tục.
function calculateGlobalRowAngle(geojson){
    const sampleZoom = 18;
    let sumCos = 0;
    let sumSin = 0;
    let totalWeight = 0;

    (geojson.features || []).forEach(feature => {
        outerRings(feature.geometry).forEach(ring => {
            if(!ring || ring.length < 3) return;
            const points = ring.map(c => map.project(L.latLng(c[1], c[0]), sampleZoom));
            const n = points.length;
            let mx = 0, my = 0;
            points.forEach(p => { mx += p.x; my += p.y; });
            mx /= n; my /= n;

            let xx = 0, yy = 0, xy = 0;
            points.forEach(p => {
                const dx = p.x - mx;
                const dy = p.y - my;
                xx += dx * dx;
                yy += dy * dy;
                xy += dx * dy;
            });
            xx /= n; yy /= n; xy /= n;

            const spread = xx + yy;
            const anisotropy = Math.sqrt((xx - yy) ** 2 + 4 * xy * xy);
            if(spread <= 0 || anisotropy / spread < 0.08) return;

            const theta = 0.5 * Math.atan2(2 * xy, xx - yy);
            const weight = anisotropy;
            sumCos += weight * Math.cos(2 * theta);
            sumSin += weight * Math.sin(2 * theta);
            totalWeight += weight;
        });
    });

    // Mặc định luống dọc màn hình khi hình thửa không đủ rõ để tính góc.
    return totalWeight > 0 ? 0.5 * Math.atan2(sumSin, sumCos) : Math.PI / 2;
}

const GlobalParcelTexture = L.Layer.extend({
    initialize(geojson, options){
        L.setOptions(this, options);
        this._geojson = geojson;
        this._rotation = options.rotation || 0;
        this._image = new Image();
        this._image.decoding = 'async';
        this._image.onload = () => {
            this._tile = this._makeTile();
            this._reset();
        };
        this._image.src = options.imageUrl;
    },

    onAdd(mapInstance){
        this._map = mapInstance;
        this._canvas = L.DomUtil.create('canvas', 'global-row-texture leaflet-layer');
        this._canvas.setAttribute('aria-hidden', 'true');
        this._map.getPane(this.options.pane).appendChild(this._canvas);
        this._map.on('moveend zoomend resize viewreset', this._reset, this);
        this._reset();
    },

    onRemove(){
        this._map.off('moveend zoomend resize viewreset', this._reset, this);
        L.DomUtil.remove(this._canvas);
        this._canvas = null;
        this._map = null;
    },

    _makeTile(){
        const tile = document.createElement('canvas');
        tile.width = this.options.tileWidth;
        tile.height = this.options.tileHeight;
        const tileCtx = tile.getContext('2d', {alpha:true});
        tileCtx.imageSmoothingEnabled = true;
        tileCtx.imageSmoothingQuality = 'high';
        tileCtx.drawImage(this._image, 0, 0, tile.width, tile.height);
        return tile;
    },

    _appendRing(ctx, ring, topLeft){
        if(!ring || ring.length < 3) return;
        ring.forEach((coord, index) => {
            const p = this._map.latLngToLayerPoint(L.latLng(coord[1], coord[0])).subtract(topLeft);
            if(index === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        });
        ctx.closePath();
    },

    _appendGeometry(ctx, geometry, topLeft){
        if(!geometry) return;
        if(geometry.type === 'Polygon'){
            geometry.coordinates.forEach(ring => this._appendRing(ctx, ring, topLeft));
        }else if(geometry.type === 'MultiPolygon'){
            geometry.coordinates.forEach(polygon => polygon.forEach(ring => this._appendRing(ctx, ring, topLeft)));
        }
    },

    _reset(){
        if(!this._map || !this._canvas) return;

        const size = this._map.getSize();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const topLeft = this._map.containerPointToLayerPoint([0, 0]);

        L.DomUtil.setPosition(this._canvas, topLeft);
        this._canvas.style.width = `${size.x}px`;
        this._canvas.style.height = `${size.y}px`;

        const pixelWidth = Math.max(1, Math.round(size.x * dpr));
        const pixelHeight = Math.max(1, Math.round(size.y * dpr));
        if(this._canvas.width !== pixelWidth) this._canvas.width = pixelWidth;
        if(this._canvas.height !== pixelHeight) this._canvas.height = pixelHeight;

        const ctx = this._canvas.getContext('2d', {alpha:true});
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);
        if(!this._tile || !this._image.complete) return;

        ctx.save();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.beginPath();
        (this._geojson.features || []).forEach(feature => this._appendGeometry(ctx, feature.geometry, topLeft));
        try{ ctx.clip('evenodd'); }catch(_){ ctx.clip(); }

        // Neo hoa văn vào hệ tọa độ pixel toàn bản đồ, không neo riêng từng thửa.
        const pixelOrigin = this._map.getPixelOrigin();
        const worldAnchor = pixelOrigin.add(topLeft);
        ctx.setTransform(dpr, 0, 0, dpr, -worldAnchor.x * dpr, -worldAnchor.y * dpr);
        ctx.rotate(this._rotation);
        ctx.globalAlpha = this.options.opacity;
        ctx.fillStyle = ctx.createPattern(this._tile, 'repeat');

        // Tính vùng cần phủ sau khi xoay để không hở ở bốn góc màn hình.
        const cos = Math.cos(-this._rotation);
        const sin = Math.sin(-this._rotation);
        const corners = [
            [worldAnchor.x, worldAnchor.y],
            [worldAnchor.x + size.x, worldAnchor.y],
            [worldAnchor.x, worldAnchor.y + size.y],
            [worldAnchor.x + size.x, worldAnchor.y + size.y]
        ].map(([x,y]) => ({x:x*cos - y*sin, y:x*sin + y*cos}));
        const xs = corners.map(p => p.x);
        const ys = corners.map(p => p.y);
        const pad = Math.max(this.options.tileWidth, this.options.tileHeight) * 2;
        const minX = Math.min(...xs) - pad;
        const minY = Math.min(...ys) - pad;
        const maxX = Math.max(...xs) + pad;
        const maxY = Math.max(...ys) + pad;
        ctx.fillRect(minX, minY, maxX - minX, maxY - minY);
        ctx.restore();
    }
});

async function loadMap(){
    try{
        const thuaData = await loadFirstAvailable(FILES.thua);

        const parcelBase = L.geoJSON(thuaData, {
            pane:'polygonPane',
            style:feature => ({
                color:'transparent',
                weight:0,
                fillColor:getQualityColor(feature),
                fillOpacity:1,
                lineJoin:'round',
                lineCap:'round'
            }),
            onEachFeature:(feature, layer) => {
                layer.bindPopup(createPopup(feature.properties));
                const bounds = layer.getBounds();
                const nw = bounds.getNorthWest();
                const pos = L.latLng(nw.lat - 0.00005, nw.lng + 0.00005);
                L.marker(pos, {
                    pane:'labelPane',
                    interactive:false,
                    icon:L.divIcon({
                        className:'thua-label',
                        html:(feature.properties || {})['Thửa (Plot)'] || '',
                        iconSize:null
                    })
                }).addTo(map);
            }
        }).addTo(map);

        map.fitBounds(parcelBase.getBounds(), {padding:[8,8]});

        const globalDirection = calculateGlobalRowAngle(thuaData);
        const rotation = globalDirection - Math.PI / 2 + ROW_ANGLE_OFFSET_DEG * Math.PI / 180;

        new GlobalParcelTexture(thuaData, {
            pane:'texturePane',
            imageUrl:ROW_TEXTURE_DATA,
            tileWidth:ROW_TILE_WIDTH,
            tileHeight:ROW_TILE_HEIGHT,
            opacity:ROW_TEXTURE_OPACITY,
            rotation
        }).addTo(map);

        // Phủ màu phân loại rất nhẹ lên ảnh nhưng không làm mất chi tiết luống.
        L.geoJSON(thuaData, {
            pane:'tintPane',
            interactive:false,
            style:feature => ({
                color:'transparent',
                weight:0,
                fillColor:getQualityColor(feature),
                fillOpacity:0.16
            })
        }).addTo(map);

        // Vẽ ranh thửa sau cùng để ranh luôn rõ, ảnh luống không tràn qua mép.
        L.geoJSON(thuaData, {
            pane:'parcelBorderPane',
            interactive:false,
            style:{
                color:'#FFFFFF',
                weight:1.25,
                opacity:1,
                fill:false,
                lineJoin:'round',
                lineCap:'round'
            }
        }).addTo(map);
    }catch(error){
        console.error(error);
        alert('Không tìm thấy dữ liệu thửa. Hãy đặt index.html cùng thư mục với Thua.geojson hoặc Thua(6).geojson.');
    }

    loadFirstAvailable(FILES.lineLo).then(data => {
        L.geoJSON(data,{pane:'linePane',interactive:false,style:{color:'#ffffff',weight:4,opacity:1}}).addTo(map);
        L.geoJSON(data,{pane:'linePane',interactive:false,style:{color:'#29B6F6',weight:2,opacity:1}}).addTo(map);
    }).catch(console.warn);

    loadFirstAvailable(FILES.ranhXN).then(data => {
        L.geoJSON(data,{pane:'ranhPane',interactive:false,style:{color:'#8B0000',weight:5,opacity:1,fill:false}}).addTo(map);
    }).catch(console.warn);

    loadFirstAvailable(FILES.tenXN).then(data => {
        const layer = L.geoJSON(data,{
            pane:'labelPane',
            pointToLayer:(feature,latlng) => L.marker(latlng,{
                pane:'labelPane',
                interactive:false,
                icon:L.divIcon({className:'xn-label',html:(feature.properties || {}).Name || '',iconSize:[120,30]})
            })
        }).addTo(map);
        layer.bringToFront();
    }).catch(console.warn);

    loadFirstAvailable(FILES.textLo).then(data => {
        const layer = L.geoJSON(data,{
            pane:'labelPane',
            pointToLayer:(feature,latlng) => L.marker(latlng,{
                pane:'labelPane',
                interactive:false,
                icon:L.divIcon({className:'lo-label',html:(feature.properties || {}).Name || '',iconSize:[22,22]})
            })
        }).addTo(map);
        layer.bringToFront();
    }).catch(console.warn);
}

loadMap();
</script>
